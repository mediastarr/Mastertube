<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AR ViewTube Panel</title>
  <meta name="viewport" content="width=600, initial-scale=1.0" />
  <style>
    :root {
      --panel-size: 600px;
      --accent: #ff0000;
      --text-main: #ffffff;
      --text-sub: #b3b3b3;
      --glass-bg: rgba(0, 0, 0, 0.55);
      --border-soft: rgba(255, 255, 255, 0.18);
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition-fast: 0.18s ease-out;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    #ar-panel {
      position: relative;
      width: var(--panel-size);
      height: var(--panel-size);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
      background: rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 14px 6px;
    }

    .top-left {
      max-width: 60%;
    }

    .video-title {
      font-size: 14px;
      font-weight: 600;
    }

    .video-meta {
      margin-top: 2px;
      font-size: 11px;
      color: var(--text-sub);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .channel-name {
      font-size: 12px;
      font-weight: 600;
    }

    .channel-subs {
      font-size: 11px;
      color: var(--text-sub);
    }

    .subscribe-btn {
      padding: 6px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }

    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 10px;
      padding: 6px 14px 8px;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-radius: var(--radius-md);
      background: var(--glass-bg);
      border: 1px solid var(--border-soft);
      padding: 8px;
    }

    .player-video {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #111;
    }

    .player-video iframe {
      width: 100%;
      height: 220px;
      border: none;
    }

    .player-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 6px 8px;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.7),
        rgba(0, 0, 0, 0.0)
      );
    }

    .progress-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .time-label {
      font-size: 11px;
      color: var(--text-sub);
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    #progress-fill {
      width: 20%;
      height: 100%;
      background: var(--accent);
    }

    .engagement-row {
      display: flex;
      gap: 8px;
    }

    .engage-btn {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-main);
      font-size: 11px;
      cursor: pointer;
    }

    .description-block {
      font-size: 11px;
      color: var(--text-sub);
      max-height: 70px;
      overflow: hidden;
    }

    .related-column {
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-soft);
      padding: 6px;
      overflow-y: auto;
    }

    .related-column::-webkit-scrollbar {
      width: 4px;
    }
    .related-column::-webkit-scrollbar-track {
      background: transparent;
    }
    .related-column::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
    }

    .related-card {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 6px;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast);
    }

    .related-card:hover {
      transform: translateY(-2px);
      background: rgba(0, 0, 0, 0.95);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
    }

    .related-thumb {
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
    }

    .related-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .related-title {
      font-size: 11px;
      font-weight: 600;
    }

    .related-channel {
      font-size: 10px;
      color: var(--text-sub);
    }

    .related-meta {
      font-size: 10px;
      color: var(--text-sub);
    }

    .bottom-hud {
      padding: 6px 14px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mini-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--border-soft);
    }

    .mini-thumb {
      width: 40px;
      height: 24px;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
      background-color: #222;
    }

    .mini-info {
      display: flex;
      flex-direction: column;
    }

    .mini-title {
      font-size: 10px;
    }

    .mini-channel {
      font-size: 9px;
      color: var(--text-sub);
    }

    .mini-controls {
      display: flex;
      gap: 6px;
      margin-left: 8px;
    }

    .mini-btn {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-sub);
      font-size: 9px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="ar-panel">
    <header class="top-bar">
      <div class="top-left">
        <div class="video-title" id="video-title">
          Temiwo Woods – Stay Golden (Official Video)
        </div>
        <div class="video-meta">
          <span id="video-views">48K views</span>
          <span>•</span>
          <span id="video-age">3 weeks ago</span>
        </div>
      </div>
      <div class="top-right">
        <div class="channel-block">
          <div class="channel-name" id="channel-name">Temiwo Woods</div>
          <div class="channel-subs" id="channel-subs">12.4K subscribers</div>
        </div>
        <button class="subscribe-btn" id="subscribe-btn">Subscribe</button>
      </div>
    </header>

    <main class="main-layout">
      <section class="player-card">
        <div class="player-video">
          <iframe
            id="player-iframe"
            src=""
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>

          <div class="player-overlay">
            <div class="progress-row">
              <div class="time-label">
                <span id="current-time">0:42</span>
                <span>/</span>
                <span id="total-time">3:05</span>
              </div>
              <div class="progress-bar">
                <div id="progress-fill"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="engagement-row">
          <button class="engage-btn" id="like-btn">
            👍 <span id="like-count">1.2K</span>
          </button>
          <button class="engage-btn">↗ Share</button>
          <button class="engage-btn">💾 Save</button>
        </div>

        <div class="description-block" id="description-block">
          48K views • 3 weeks ago<br />
          Stream “Stay Golden”: https://temiwowoods.lnk.to/staygolden …more
        </div>
      </section>

      <aside class="related-column" id="related-column">
        <!-- Cards injected by JS -->
      </aside>
    </main>

    <footer class="bottom-hud">
      <div class="mini-player">
        <div class="mini-thumb" id="mini-thumb"></div>
        <div class="mini-info">
          <div class="mini-title" id="mini-title">Stay Golden</div>
          <div class="mini-channel" id="mini-channel">Temiwo Woods</div>
        </div>
        <div class="mini-controls">
          <button class="mini-btn" id="emg-like">Double‑pinch: Like</button>
          <button class="mini-btn" id="emg-volume">Rotate wrist: Volume</button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const API_KEY = "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX";

    const SEARCH_URL =
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20";
    const VIDEO_URL =
      "https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails";

    let state = {
      nextPageToken: null,
      isLoading: false,
      currentVideoId: null,
    };

    const relatedColumn = document.getElementById("related-column");
    const playerIframe = document.getElementById("player-iframe");

    const videoTitleEl = document.getElementById("video-title");
    const videoViewsEl = document.getElementById("video-views");
    const videoAgeEl = document.getElementById("video-age");
    const channelNameEl = document.getElementById("channel-name");
    const channelSubsEl = document.getElementById("channel-subs");
    const likeCountEl = document.getElementById("like-count");
    const descriptionBlockEl = document.getElementById("description-block");
    const currentTimeEl = document.getElementById("current-time");
    const totalTimeEl = document.getElementById("total-time");
    const progressFillEl = document.getElementById("progress-fill");

    const miniThumbEl = document.getElementById("mini-thumb");
    const miniTitleEl = document.getElementById("mini-title");
    const miniChannelEl = document.getElementById("mini-channel");

    const emgLikeBtn = document.getElementById("emg-like");
    const emgVolumeBtn = document.getElementById("emg-volume");

    const INITIAL_QUERY = "Temiwo Woods Stay Golden official video";

    function buildSearchUrl(query) {
      let url = `${SEARCH_URL}&q=${encodeURIComponent(query)}&key=${API_KEY}`;
      if (state.nextPageToken) {
        url += `&pageToken=${state.nextPageToken}`;
      }
      return url;
    }

    async function loadInitialBatch() {
      state.nextPageToken = null;
      relatedColumn.innerHTML = "";
      await loadNextBatch(true);
    }

    async function loadNextBatch(resetMain = false) {
      if (state.isLoading) return;
      state.isLoading = true;

      try {
        const url = buildSearchUrl(INITIAL_QUERY);
        const res = await fetch(url);
        const data = await res.json();

        state.nextPageToken = data.nextPageToken || null;
        const items = data.items || [];

        if (resetMain && items.length > 0) {
          const first = items[0];
          await setMainVideo(first);
          items.slice(1).forEach(addRelatedCard);
        } else {
          items.forEach(addRelatedCard);
        }
      } catch (err) {
        console.error("YouTube search error", err);
      } finally {
        state.isLoading = false;
      }
    }

    function addRelatedCard(item) {
      const { snippet, id } = item;
      const videoId = id.videoId;

      const card = document.createElement("div");
      card.className = "related-card";
      card.dataset.videoId = videoId;

      const thumb = document.createElement("div");
      thumb.className = "related-thumb";
      thumb.style.backgroundImage = `url(${snippet.thumbnails.medium.url})`;

      const info = document.createElement("div");
      info.className = "related-info";

      const title = document.createElement("div");
      title.className = "related-title";
      title.textContent = snippet.title;

      const channel = document.createElement("div");
      channel.className = "related-channel";
      channel.textContent = snippet.channelTitle;

      const meta = document.createElement("div");
      meta.className = "related-meta";
      meta.textContent = formatMeta(snippet);

      info.appendChild(title);
      info.appendChild(channel);
      info.appendChild(meta);

      card.appendChild(thumb);
      card.appendChild(info);

      card.addEventListener("click", () => {
        setMainVideo(item);
      });

      relatedColumn.appendChild(card);
    }

    function formatMeta(snippet) {
      const published = new Date(snippet.publishedAt);
      const age = timeAgo(published);
      return `${age}`;
    }

    function timeAgo(date) {
      const diff = (Date.now() - date.getTime()) / 1000;
      const days = Math.floor(diff / 86400);
      if (days < 1) return "Today";
      if (days === 1) return "1 day ago";
      if (days < 30) return `${days} days ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months} months ago`;
      const years = Math.floor(months / 12);
      return `${years} years ago`;
    }

    async function setMainVideo(item) {
      const { snippet, id } = item;
      const videoId = id.videoId;
      state.currentVideoId = videoId;

      playerIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0`;

      videoTitleEl.textContent = snippet.title;
      channelNameEl.textContent = snippet.channelTitle;

      descriptionBlockEl.textContent = snippet.description;

      miniThumbEl.style.backgroundImage = `url(${snippet.thumbnails.default.url})`;
      miniTitleEl.textContent = snippet.title;
      miniChannelEl.textContent = snippet.channelTitle;

      try {
        const url = `${VIDEO_URL}&id=${videoId}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        const video = data.items?.[0];
        if (video) {
          const stats = video.statistics || {};
          const details = video.contentDetails || {};

          likeCountEl.textContent = formatCount(stats.likeCount);
          videoViewsEl.textContent = stats.viewCount
            ? `${formatCount(stats.viewCount)} views`
            : "Views unknown";

          const durationSeconds = parseISO8601Duration(details.duration);
          totalTimeEl.textContent = formatTime(durationSeconds);
          const current = Math.floor(durationSeconds * 0.2);
          currentTimeEl.textContent = formatTime(current);
          progressFillEl.style.width = "20%";

          channelSubsEl.textContent = "Channel";
        }
      } catch (err) {
        console.error("Video details error", err);
      }
    }

    function formatCount(n) {
      if (!n) return "0";
      const num = Number(n);
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + "M";
      if (num >= 1_000) return (num / 1_000).toFixed(1) + "K";
      return String(num);
    }

    function parseISO8601Duration(iso) {
      if (!iso) return 0;
      const match = iso.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      if (!match) return 0;
      const minutes = Number(match[1] || 0);
      const seconds = Number(match[2] || 0);
      return minutes * 60 + seconds;
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    relatedColumn.addEventListener("scroll", () => {
      const { scrollTop, scrollHeight, clientHeight } = relatedColumn;
      const nearBottom = scrollTop + clientHeight >= scrollHeight - 40;
      if (nearBottom && !state.isLoading && state.nextPageToken) {
        loadNextBatch(false);
      }
    });

    emgLikeBtn.addEventListener("click", () => {
      if (!state.currentVideoId) return;
      console.log("EMG double‑pinch like for", state.currentVideoId);
    });

    emgVolumeBtn.addEventListener("click", () => {
      console.log("EMG wrist rotation volume gesture");
    });

    loadInitialBatch();
  </script>
</body>
</html>
