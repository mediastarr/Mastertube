<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ViewTube – Fullscreen Player + Search</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    width: 100%;
    height: 100%;
    font-family: system-ui, sans-serif;
    color: #fff;
  }

  #root {
    width: 600px;
    height: 600px;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .banner {
    margin: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
  }

  .yt {
    width: 26px;
    height: 26px;
    background: #ff0000;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .yt::before {
    content: "";
    border-left: 8px solid white;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }

  /* TABS */
  .tabs {
    margin: 0 10px 10px 10px;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: rgba(0,0,0,0.5);
    border-radius: 999px;
  }

  .tab {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 12px;
    cursor: pointer;
  }

  .tab.active {
    background: #ff0000;
    border-color: #ff0000;
  }

  /* CONTENT LIST */
  .content {
    margin: 0 10px 10px 10px;
    padding: 10px;
    height: 380px;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
  }

  .video {
    display: flex;
    gap: 10px;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    cursor: pointer;
  }

  .thumb {
    width: 100px;
    height: 56px;
    border-radius: 8px;
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video.highlight {
    border: 2px solid #ff0000;
  }

  /* SEARCH BAR */
  #search-bar-wrapper {
    margin: 0 10px 8px 10px;
    display: none;
  }

  #search-input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 14px;
    outline: none;
  }

  /* FULLSCREEN PLAYER */
  #player-screen {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #player-container {
    width: 560px;
    height: 315px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }

  #player-controls {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }

  /* FIXED BUTTON VISIBILITY — WHITE TEXT + ICONS */
  .player-btn {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* FLOATING KEYBOARD */
  #keyboard {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px; /* compact */
    padding: 8px;
    background: rgba(0,0,0,0.85);
    border-radius: 14px;
    display: none;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  .kb-key {
    min-width: 26px;
    padding: 6px 8px;
    border-radius: 10px; /* medium rounded */
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 12px;
    font-weight: 700; /* bold labels */
    text-align: center;
    cursor: pointer;
    user-select: none;
  }

  .kb-key.wide {
    min-width: 50px;
  }

  .kb-key.space {
    min-width: 120px;
  }
</style>

</head>
<body>
<div id="root">

  <!-- MAIN UI -->
  <div id="main-ui">
    <div class="banner">
      <div class="yt"></div>
      <div style="font-size:18px;font-weight:700">ViewTube</div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="all">All</div>
      <div class="tab" data-tab="shorts">Shorts</div>
      <div class="tab" data-tab="news">News</div>
      <div class="tab" data-tab="anime">Anime</div>
      <div class="tab" data-tab="live">Live</div>
      <div class="tab" data-tab="movies">Movies</div>
      <div class="tab" data-tab="comedy">Comedy</div>
      <div class="tab" data-tab="search">Search</div>
    </div>

    <div id="search-bar-wrapper">
      <input id="search-input" type="text" placeholder="Search YouTube (US)" />
    </div>

    <div class="content" id="content"></div>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div id="player-screen">
    <div id="player-container">
      <div id="player"></div>
    </div>
    <div id="player-controls">
      <button class="player-btn" data-action="back10">⏪ Back 10s</button>
      <button class="player-btn" data-action="playpause">⏯ Play/Pause</button>
      <button class="player-btn" data-action="forward10">⏩ Forward 10s</button>
      <button class="player-btn" data-action="goback">⬅ Go Back</button>
    </div>
  </div>

  <!-- FLOATING KEYBOARD -->
  <div id="keyboard">
    <div class="kb-row">
      <div class="kb-key">Q</div><div class="kb-key">W</div><div class="kb-key">E</div><div class="kb-key">R</div><div class="kb-key">T</div>
      <div class="kb-key">Y</div><div class="kb-key">U</div><div class="kb-key">I</div><div class="kb-key">O</div><div class="kb-key">P</div>
    </div>
    <div class="kb-row">
      <div class="kb-key">A</div><div class="kb-key">S</div><div class="kb-key">D</div><div class="kb-key">F</div><div class="kb-key">G</div>
      <div class="kb-key">H</div><div class="kb-key">J</div><div class="kb-key">K</div><div class="kb-key">L</div>
    </div>
    <div class="kb-row">
      <div class="kb-key">Z</div><div class="kb-key">X</div><div class="kb-key">C</div><div class="kb-key">V</div><div class="kb-key">B</div>
      <div class="kb-key">N</div><div class="kb-key">M</div>
      <div class="kb-key wide" data-special="backspace">⌫</div>
    </div>
    <div class="kb-row">
      <div class="kb-key wide" data-special="clear">CLR</div>
      <div class="kb-key space" data-special="space">SPACE</div>
      <div class="kb-key wide" data-special="enter">ENTER</div>
    </div>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* Simple key rotation */
const KEYS = [
  "AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
  "AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI"
];
let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const mainUI = document.getElementById("main-ui");
const playerScreen = document.getElementById("player-screen");
const playerControls = document.getElementById("player-controls");
const searchBarWrapper = document.getElementById("search-bar-wrapper");
const searchInput = document.getElementById("search-input");
const keyboard = document.getElementById("keyboard");

let currentQuery = "";
let nextPageToken = null;
let highlightIndex = 0;
let ytPlayer = null;
let playerMode = false;
let currentTab = "all";

/* NEW FIX */
let keyboardActive = false;

function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player("player", {
    height: "315",
    width: "560",
    videoId: "",
    playerVars: { controls: 1, rel: 0 }
  });
}

/* ENFORCED US-ONLY SEARCH */
async function ytSearch(q, pageToken=null, maxResults=25, extra=""){
  let base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video" +
    "&regionCode=US&relevanceLanguage=en&safeSearch=none" +
    "&order=date&maxResults=" + maxResults +
    "&q=" + encodeURIComponent(q) +
    "&key=" + apiKey();

  if(extra) base += "&" + extra;
  if(pageToken) base += "&pageToken=" + pageToken;

  const r = await fetch(base);
  const j = await r.json();
  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}

async function loadQuery(q, maxResults=25, extra=""){
  currentQuery = q;
  nextPageToken = null;
  const items = await ytSearch(q, null, maxResults, extra);
  showVideos(items, false);
}

function showVideos(items, append){
  if(!append){
    content.innerHTML = "";
    highlightIndex = 0;
  }
  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = (sn.thumbnails && sn.thumbnails.medium && sn.thumbnails.medium.url)
      ? sn.thumbnails.medium.url
      : "";

    const div = document.createElement("div");
    div.className = "video";
    div.dataset.videoId = id;
    div.onclick = ()=>openVideo(id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div>${sn.title}</div>
        <div style="font-size:12px;opacity:0.7">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });
  applyHighlight();
}

function applyHighlight(){
  const cards = [...content.querySelectorAll(".video")];
  cards.forEach(c=>c.classList.remove("highlight"));
  if(cards.length === 0) return;
  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;
  const card = cards[highlightIndex];
  card.classList.add("highlight");
  card.scrollIntoView({block:"center", behavior:"smooth"});
}

/* FIX: prevent jump-to-top when scrolling in Search */
content.addEventListener("scroll", ()=>{
  if(currentTab === "search" && highlightIndex !== -1){
    highlightIndex = -1;
  }

  if(currentTab === "search"){
    hideKeyboard();
    searchInput.blur();
  }

  if(content.scrollTop + content.clientHeight >= content.scrollHeight - 40){
    loadMore();
  }
});

async function loadMore(){
  if(!nextPageToken) return;
  const items = await ytSearch(currentQuery, nextPageToken, 25);
  showVideos(items, true);
}

/* Tabs */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab = t.dataset.tab;
  currentTab = tab;

  nextPageToken = null;
  content.innerHTML = "";
  highlightIndex = -1;   /* NEW FIX: disable highlight when entering Search */

  if(tab === "search"){
    searchBarWrapper.style.display = "block";
    keyboardActive = false;
  } else {
    searchBarWrapper.style.display = "none";
    hideKeyboard();
  }

  let q = "";
  let max = 25;
  let extra = "";

  if(tab === "all"){
    q = "US trending videos";
    max = 50;
    extra = "videoDuration=medium";
  }
  if(tab === "shorts"){
    q = "US shorts";
    max = 50;
    extra = "videoDuration=short";
  }
  if(tab === "news"){
    q = "US news";
    max = 40;
  }
  if(tab === "anime"){
    q = "anime english dub";
    max = 40;
  }
  if(tab === "live"){
    q = "live stream";
    extra = "eventType=live";
    max = 40;
  }
  if(tab === "movies"){
    q = "full movie free";
    extra = "videoDuration=long";
    max = 40;
  }
  if(tab === "comedy"){
    q = "stand up comedy";
    max = 40;
  }

  if(tab !== "search"){
    await loadQuery(q, max, extra);
  }
});

/* FULLSCREEN PLAYER */
function openVideo(id){
  hideKeyboard();
  searchInput.blur();
  playerMode = true;
  mainUI.style.display = "none";
  playerScreen.style.display = "flex";
  ytPlayer.loadVideoById(id);
  ytPlayer.playVideo();
}

function closePlayer(){
  playerMode = false;
  playerScreen.style.display = "none";
  mainUI.style.display = "block";
  ytPlayer.stopVideo();
}

/* Player controls */
playerControls.addEventListener("click", e=>{
  const btn = e.target.closest(".player-btn");
  if(!btn) return;
  const action = btn.dataset.action;

  if(action === "playpause"){
    const s = ytPlayer.getPlayerState();
    if(s === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  }
  if(action === "forward10"){
    ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  }
  if(action === "back10"){
    ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 10), true);
  }
  if(action === "goback"){
    closePlayer();
  }
});

/* Keyboard navigation */
function moveHighlight(delta){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;
  highlightIndex += delta;
  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;
  applyHighlight();
}

function openHighlightedVideo(){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;
  const card = cards[highlightIndex];
  const id = card.dataset.videoId;
  if(id) openVideo(id);
}

/* FIX: disable highlight navigation while keyboard is active */
document.addEventListener("keydown", e=>{
  if(playerMode) return;

  if(currentTab === "search" && !keyboardActive){
    highlightIndex = -1;
  }

  if(keyboardActive){
    if(e.key === "Enter" || e.key === "ArrowDown" || e.key === "ArrowUp"){
      return;
    }
  }

  if(e.key === "ArrowDown") moveHighlight(1);
  if(e.key === "ArrowUp") moveHighlight(-1);
  if(e.key === "Enter") openHighlightedVideo();
});

/* Hide keyboard when clicking outside */
document.addEventListener("click", e=>{
  if(!keyboard.contains(e.target) && e.target !== searchInput){
    hideKeyboard();
    searchInput.blur();
  }
});

/* SEARCH TAB + FLOATING KEYBOARD */
searchInput.addEventListener("focus", showKeyboard);
searchInput.addEventListener("click", ()=>{
  highlightIndex = -1;
  showKeyboard();
});

function showKeyboard(){
  keyboard.style.display = "block";
  keyboardActive = true;
  highlightIndex = -1;
}

function hideKeyboard(){
  keyboard.style.display = "none";
  keyboardActive = false;
}

keyboard.addEventListener("click", async e=>{
  const key = e.target.closest(".kb-key");
  if(!key) return;

  const special = key.dataset.special;
  if(special){
    if(special === "space"){
      searchInput.value += " ";
    }
    if(special === "backspace"){
      searchInput.value = searchInput.value.slice(0, -1);
    }
    if(special === "clear"){
      searchInput.value = "";
    }
    if(special === "enter"){
      hideKeyboard();
      searchInput.blur();
      const q = searchInput.value.trim();
      if(q){
        currentQuery = q;
        nextPageToken = null;
        const items = await ytSearch(q, null, 40, "");
        showVideos(items, false);
      }
    }
  } else {
    const ch = key.textContent;
    searchInput.value += ch;
  }
});

/* Initial load */
(async ()=>{
  await loadQuery("US trending videos", 50, "videoDuration=medium");
})();
</script>

</body>
</html>
