<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ViewTube Stealth Fixed</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    font-family: system-ui, sans-serif;
    color: #fff;
  }

  #root {
    width: 600px;
    height: 600px;
    position: relative;
    background: transparent;
    overflow: hidden;
  }

  .glass {
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
  }

  .banner {
    margin: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .yt {
    width: 26px;
    height: 26px;
    background: #ff0000;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .yt::before {
    content: "";
    border-left: 8px solid white;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }

  .tabs {
    margin: 0 10px 10px 10px;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tab {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 12px;
    cursor: pointer;
  }

  .tab.active {
    background: rgba(255,0,0,0.75);
    border-color: rgba(255,0,0,0.9);
  }

  /* S1: Scroll INSIDE content panel */
  .content {
    margin: 0 10px 10px 10px;
    padding: 10px;
    height: 420px;
    overflow-y: scroll;
  }

  .video {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 10px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
  }

  .thumb {
    width: 100px;
    height: 56px;
    border-radius: 8px;
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Keyboard */
  #keyboard {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 10px;
    padding: 10px;
    display: none;
    z-index: 20;
  }

  #kb-input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.6);
    color: white;
    margin-bottom: 8px;
  }

  .kb-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .key {
    padding: 8px 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 12px;
    cursor: pointer;
  }

  .enter {
    background: rgba(0,255,0,0.35);
    border-color: rgba(0,255,0,0.6);
  }
</style>
</head>

<body>
<div id="root">

  <div class="banner glass">
    <div class="yt"></div>
    <div style="font-size:18px;font-weight:700">ViewTube</div>
  </div>

  <div class="tabs glass" id="tabs">
    <div class="tab active" data-tab="all">All</div>
    <div class="tab" data-tab="shorts">Shorts</div>
    <div class="tab" data-tab="news">News</div>
    <div class="tab" data-tab="anime">Anime</div>
    <div class="tab" data-tab="live">Live</div>
    <div class="tab" data-tab="movies">Movies</div>
    <div class="tab" data-tab="comedy">Comedy</div>
    <div class="tab" data-tab="search">Search</div>
  </div>

  <div class="content glass" id="content"></div>

  <!-- Keyboard -->
  <div id="keyboard" class="glass">
    <input id="kb-input" placeholder="Search…" />
    <div class="kb-row" id="kb-keys"></div>
    <div class="kb-row">
      <div class="key enter" id="kb-enter">Enter</div>
    </div>
  </div>

</div>

<script>
/* NEW API KEYS */
const KEYS = [
"AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
"AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI",
"AIzaSyD903GIIkzLZyeOvqMrVW3q3wJy4jcHO7E",
"AIzaSyCWlw8qpBueGgjvTF4BZ54syzQkTevM_8g",
"AIzaSyDIjQgEy4VmFN2OxUkJisqVFw9repJcTF8",
"AIzaSyD6aEVz7iaTGJShyDDBZT4C27YG1vEc1_M",
"AIzaSyAGKeySf2F3BskBrZNylOSGJuHQRX_Rp5E",
"AIzaSyBBgj7-tN6VBAG3ziJQKCQL7EJZR4wUW-k",
"AIzaSyCUmBro68VHtC6_OsqlpssTVasHk2NmBLc",
"AIzaSyDXugJlNG12ObzxV5WGjgNVob5OhfF6moM"
];
let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

/* DOM */
const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const kb = document.getElementById("keyboard");
const kbInput = document.getElementById("kb-input");
const kbKeys = document.getElementById("kb-keys");

/* Render videos */
function showVideos(items){
  content.innerHTML = "";
  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = sn.thumbnails?.medium?.url || "";

    const div = document.createElement("div");
    div.className = "video";
    div.onclick = ()=>window.open("https://youtube.com/watch?v="+id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div class="video-title">${sn.title}</div>
        <div class="video-channel">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });
}

/* Fetch */
async function yt(q){
  const url =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=25&regionCode=US&q="
    + encodeURIComponent(q)
    + "&key=" + apiKey();

  const r = await fetch(url);
  const j = await r.json();
  return j.items || [];
}

/* Tab logic */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab = t.dataset.tab;

  if(tab==="search"){
    kb.style.display = "block";
    kbInput.value = "";
    return;
  }

  kb.style.display = "none";

  const queryMap = {
    all: "trending",
    shorts: "shorts",
    news: "US news",
    anime: "anime english dub",
    live: "live stream",
    movies: "full movie",
    comedy: "stand up comedy"
  };

  const items = await yt(queryMap[tab]);
  showVideos(items);
});

/* Keyboard */
const letters = "QWERTYUIOPASDFGHJKLZXCVBNM ".split("");
letters.forEach(ch=>{
  const k = document.createElement("div");
  k.className = "key";
  k.textContent = ch===" " ? "Space" : ch;
  k.onclick = ()=>{
    kbInput.value += (ch===" " ? " " : ch);
  };
  kbKeys.appendChild(k);
});

document.getElementById("kb-enter").onclick = async ()=>{
  const q = kbInput.value.trim();
  kb.style.display = "none";
  if(q){
    const items = await yt(q);
    showVideos(items);
  }
};

/* Initial load */
(async ()=>{
  const items = await yt("trending");
  showVideos(items);
})();
</script>

</body>
</html>
