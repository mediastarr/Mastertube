<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AR ViewTube Panel</title>
  <meta name="viewport" content="width=600, initial-scale=1.0" />
  <style>
    :root {
      --panel-size: 600px;
      --accent: #ff0000;
      --text-main: #ffffff;
      --text-sub: #b3b3b3;
      --glass-bg: rgba(0, 0, 0, 0.55);
      --border-soft: rgba(255, 255, 255, 0.18);
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition-fast: 0.18s ease-out;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    #ar-panel {
      position: relative;
      width: var(--panel-size);
      height: var(--panel-size);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
      background: rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    /* Top bar: title + channel + views (player header) */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 14px 6px;
    }

    .top-left {
      max-width: 60%;
    }

    .video-title {
      font-size: 14px;
      font-weight: 600;
    }

    .video-meta {
      margin-top: 2px;
      font-size: 11px;
      color: var(--text-sub);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .channel-name {
      font-size: 12px;
      font-weight: 600;
    }

    .channel-subs {
      font-size: 11px;
      color: var(--text-sub);
    }

    .subscribe-btn {
      padding: 6px 12px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }

    /* Main layout: left suggestions/player, right tabs + feed */
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1.3fr 1.1fr;
      gap: 10px;
      padding: 6px 14px 8px;
    }

    /* LEFT PANEL */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-card {
      display: none; /* hidden until a video is opened */
      flex-direction: column;
      gap: 8px;
      border-radius: var(--radius-md);
      background: var(--glass-bg);
      border: 1px solid var(--border-soft);
      padding: 8px;
    }

    .player-video {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #111;
    }

    .player-video iframe {
      width: 100%;
      height: 220px;
      border: none;
    }

    .player-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 6px 8px;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.7),
        rgba(0, 0, 0, 0.0)
      );
    }

    .progress-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .time-label {
      font-size: 11px;
      color: var(--text-sub);
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    #progress-fill {
      width: 20%;
      height: 100%;
      background: var(--accent);
    }

    .engagement-row {
      display: flex;
      gap: 8px;
    }

    .engage-btn {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-main);
      font-size: 11px;
      cursor: pointer;
    }

    .description-block {
      font-size: 11px;
      color: var(--text-sub);
      max-height: 70px;
      overflow: hidden;
    }

    /* Suggestions list under/without player */
    .suggestions-column {
      flex: 1;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-soft);
      padding: 6px;
      overflow-y: auto;
    }

    .suggestions-column::-webkit-scrollbar {
      width: 4px;
    }
    .suggestions-column::-webkit-scrollbar-track {
      background: transparent;
    }
    .suggestions-column::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
    }

    .suggest-card {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 6px;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast);
    }

    .suggest-card:hover {
      transform: translateY(-2px);
      background: rgba(0, 0, 0, 0.95);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
    }

    .suggest-thumb {
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
    }

    .suggest-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .suggest-title {
      font-size: 11px;
      font-weight: 600;
    }

    .suggest-channel {
      font-size: 10px;
      color: var(--text-sub);
    }

    .suggest-meta {
      font-size: 10px;
      color: var(--text-sub);
    }

    /* RIGHT PANEL: tabs + feed */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tabs-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .tabs-left {
      display: flex;
      gap: 6px;
    }

    .tab-btn {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-sub);
      font-size: 11px;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast),
        border-color var(--transition-fast), transform var(--transition-fast);
    }

    .tab-btn.active {
      color: var(--text-main);
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.9);
      transform: translateY(-1px);
    }

    .tabs-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #search-input {
      width: 120px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-main);
      font-size: 11px;
      outline: none;
    }

    .feed-column {
      flex: 1;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-soft);
      padding: 6px;
      overflow-y: auto;
    }

    .feed-column::-webkit-scrollbar {
      width: 4px;
    }
    .feed-column::-webkit-scrollbar-track {
      background: transparent;
    }
    .feed-column::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
    }

    .feed-card {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 6px;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast);
    }

    .feed-card:hover {
      transform: translateY(-2px);
      background: rgba(0, 0, 0, 0.95);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
    }

    .feed-thumb {
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
    }

    .feed-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .feed-title {
      font-size: 11px;
      font-weight: 600;
    }

    .feed-channel {
      font-size: 10px;
      color: var(--text-sub);
    }

    .feed-meta {
      font-size: 10px;
      color: var(--text-sub);
    }

    /* Bottom HUD / mini-player */
    .bottom-hud {
      padding: 6px 14px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mini-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--border-soft);
    }

    .mini-thumb {
      width: 40px;
      height: 24px;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
      background-color: #222;
    }

    .mini-info {
      display: flex;
      flex-direction: column;
    }

    .mini-title {
      font-size: 10px;
    }

    .mini-channel {
      font-size: 9px;
      color: var(--text-sub);
    }

    .mini-controls {
      display: flex;
      gap: 6px;
      margin-left: 8px;
    }

    .mini-btn {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-sub);
      font-size: 9px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="ar-panel">
    <!-- Player header (only meaningful when a video is open) -->
    <header class="top-bar">
      <div class="top-left">
        <div class="video-title" id="video-title">
          <!-- Filled when video opens -->
        </div>
        <div class="video-meta">
          <span id="video-views"></span>
          <span id="video-dot" style="display:none;">•</span>
          <span id="video-age"></span>
        </div>
      </div>
      <div class="top-right">
        <div class="channel-block">
          <div class="channel-name" id="channel-name"></div>
          <div class="channel-subs" id="channel-subs"></div>
        </div>
        <button class="subscribe-btn" id="subscribe-btn">Subscribe</button>
      </div>
    </header>

    <main class="main-layout">
      <!-- LEFT: suggestions + player -->
      <section class="left-panel">
        <div class="player-card" id="player-card">
          <div class="player-video">
            <iframe
              id="player-iframe"
              src=""
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>

            <div class="player-overlay">
              <div class="progress-row">
                <div class="time-label">
                  <span id="current-time">0:00</span>
                  <span>/</span>
                  <span id="total-time">0:00</span>
                </div>
                <div class="progress-bar">
                  <div id="progress-fill"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="engagement-row">
            <button class="engage-btn" id="like-btn">
              👍 <span id="like-count">0</span>
            </button>
            <button class="engage-btn">↗ Share</button>
            <button class="engage-btn">💾 Save</button>
          </div>

          <div class="description-block" id="description-block"></div>
        </div>

        <div class="suggestions-column" id="suggestions-column">
          <!-- suggestion cards injected here -->
        </div>
      </section>

      <!-- RIGHT: tabs + feed -->
      <section class="right-panel">
        <div class="tabs-row">
          <div class="tabs-left">
            <button class="tab-btn active" data-tab="home">Home</button>
            <button class="tab-btn" data-tab="shorts">Shorts</button>
            <button class="tab-btn" data-tab="movies">Movies</button>
            <button class="tab-btn" data-tab="trending">Trending</button>
            <button class="tab-btn" data-tab="search">🔍</button>
            <button class="tab-btn" data-tab="more">⋮</button>
          </div>
          <div class="tabs-right">
            <input
              id="search-input"
              type="text"
              placeholder="Search..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="feed-column" id="feed-column">
          <!-- feed cards injected here -->
        </div>
      </section>
    </main>

    <footer class="bottom-hud">
      <div class="mini-player">
        <div class="mini-thumb" id="mini-thumb"></div>
        <div class="mini-info">
          <div class="mini-title" id="mini-title"></div>
          <div class="mini-channel" id="mini-channel"></div>
        </div>
        <div class="mini-controls">
          <button class="mini-btn" id="emg-like">Double‑pinch: Like</button>
          <button class="mini-btn" id="emg-volume">Rotate wrist: Volume</button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const API_KEY = "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX";

    const SEARCH_URL =
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20";
    const VIDEO_URL =
      "https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails";

    const tabs = document.querySelectorAll(".tab-btn");
    const feedColumn = document.getElementById("feed-column");
    const searchInput = document.getElementById("search-input");

    const suggestionsColumn = document.getElementById("suggestions-column");
    const playerCard = document.getElementById("player-card");
    const playerIframe = document.getElementById("player-iframe");

    const videoTitleEl = document.getElementById("video-title");
    const videoViewsEl = document.getElementById("video-views");
    const videoDotEl = document.getElementById("video-dot");
    const videoAgeEl = document.getElementById("video-age");
    const channelNameEl = document.getElementById("channel-name");
    const channelSubsEl = document.getElementById("channel-subs");
    const likeCountEl = document.getElementById("like-count");
    const descriptionBlockEl = document.getElementById("description-block");
    const currentTimeEl = document.getElementById("current-time");
    const totalTimeEl = document.getElementById("total-time");
    const progressFillEl = document.getElementById("progress-fill");

    const miniThumbEl = document.getElementById("mini-thumb");
    const miniTitleEl = document.getElementById("mini-title");
    const miniChannelEl = document.getElementById("mini-channel");

    const emgLikeBtn = document.getElementById("emg-like");
    const emgVolumeBtn = document.getElementById("emg-volume");

    const state = {
      currentTab: "home",
      pageTokens: {
        home: null,
        shorts: null,
        movies: null,
        trending: null,
        search: null,
        more: null,
      },
      isLoading: false,
      currentVideoId: null,
    };

    function defaultQueryForTab(tab) {
      switch (tab) {
        case "home":
          return "Temiwo Woods Stay Golden official video";
        case "shorts":
          return "shorts funny vertical";
        case "movies":
          return "full movie trailer";
        case "trending":
          return "trending music videos";
        case "more":
          return "recommended videos";
        case "search":
          return searchInput.value.trim() || "music videos";
        default:
          return "music videos";
      }
    }

    function buildSearchUrl(tab) {
      const query = defaultQueryForTab(tab);
      let url = `${SEARCH_URL}&q=${encodeURIComponent(query)}&key=${API_KEY}`;
      const token = state.pageTokens[tab];
      if (token) {
        url += `&pageToken=${token}`;
      }
      return url;
    }

    async function loadInitialForTab(tab) {
      state.pageTokens[tab] = null;
      feedColumn.innerHTML = "";
      await loadNextBatch(tab, true);
    }

    async function loadNextBatch(tab, resetSuggestions = false) {
      if (state.isLoading) return;
      state.isLoading = true;

      try {
        const url = buildSearchUrl(tab);
        const res = await fetch(url);
        const data = await res.json();

        state.pageTokens[tab] = data.nextPageToken || null;
        const items = data.items || [];

        if (resetSuggestions) {
          suggestionsColumn.innerHTML = "";
          items.forEach((item) => addSuggestionCard(item));
        }

        items.forEach((item) => addFeedCard(item));
      } catch (err) {
        console.error("YouTube search error", err);
      } finally {
        state.isLoading = false;
      }
    }

    function addFeedCard(item) {
      const { snippet, id } = item;
      const videoId = id.videoId;

      const card = document.createElement("div");
      card.className = "feed-card";
      card.dataset.videoId = videoId;

      const thumb = document.createElement("div");
      thumb.className = "feed-thumb";
      thumb.style.backgroundImage = `url(${snippet.thumbnails.medium.url})`;

      const info = document.createElement("div");
      info.className = "feed-info";

      const title = document.createElement("div");
      title.className = "feed-title";
      title.textContent = snippet.title;

      const channel = document.createElement("div");
      channel.className = "feed-channel";
      channel.textContent = snippet.channelTitle;

      const meta = document.createElement("div");
      meta.className = "feed-meta";
      meta.textContent = formatMeta(snippet);

      info.appendChild(title);
      info.appendChild(channel);
      info.appendChild(meta);

      card.appendChild(thumb);
      card.appendChild(info);

      card.addEventListener("click", () => {
        setMainVideo(item);
      });

      feedColumn.appendChild(card);
    }

    function addSuggestionCard(item) {
      const { snippet, id } = item;
      const videoId = id.videoId;

      const card = document.createElement("div");
      card.className = "suggest-card";
      card.dataset.videoId = videoId;

      const thumb = document.createElement("div");
      thumb.className = "suggest-thumb";
      thumb.style.backgroundImage = `url(${snippet.thumbnails.medium.url})`;

      const info = document.createElement("div");
      info.className = "suggest-info";

      const title = document.createElement("div");
      title.className = "suggest-title";
      title.textContent = snippet.title;

      const channel = document.createElement("div");
      channel.className = "suggest-channel";
      channel.textContent = snippet.channelTitle;

      const meta = document.createElement("div");
      meta.className = "suggest-meta";
      meta.textContent = formatMeta(snippet);

      info.appendChild(title);
      info.appendChild(channel);
      info.appendChild(meta);

      card.appendChild(thumb);
      card.appendChild(info);

      card.addEventListener("click", () => {
        setMainVideo(item);
      });

      suggestionsColumn.appendChild(card);
    }

    function formatMeta(snippet) {
      const published = new Date(snippet.publishedAt);
      const age = timeAgo(published);
      return `${age}`;
    }

    function timeAgo(date) {
      const diff = (Date.now() - date.getTime()) / 1000;
      const days = Math.floor(diff / 86400);
      if (days < 1) return "Today";
      if (days === 1) return "1 day ago";
      if (days < 30) return `${days} days ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months} months ago`;
      const years = Math.floor(months / 12);
      return `${years} years ago`;
    }

    async function setMainVideo(item) {
      const { snippet, id } = item;
      const videoId = id.videoId;
      state.currentVideoId = videoId;

      playerCard.style.display = "flex";
      playerIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0`;

      videoTitleEl.textContent = snippet.title;
      channelNameEl.textContent = snippet.channelTitle;
      descriptionBlockEl.textContent = snippet.description;

      miniThumbEl.style.backgroundImage = `url(${snippet.thumbnails.default.url})`;
      miniTitleEl.textContent = snippet.title;
      miniChannelEl.textContent = snippet.channelTitle;

      videoDotEl.style.display = "inline";

      try {
        const url = `${VIDEO_URL}&id=${videoId}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        const video = data.items?.[0];
        if (video) {
          const stats = video.statistics || {};
          const details = video.contentDetails || {};

          likeCountEl.textContent = formatCount(stats.likeCount);
          videoViewsEl.textContent = stats.viewCount
            ? `${formatCount(stats.viewCount)} views`
            : "Views unknown";

          const durationSeconds = parseISO8601Duration(details.duration);
          totalTimeEl.textContent = formatTime(durationSeconds);
          const current = Math.floor(durationSeconds * 0.2);
          currentTimeEl.textContent = formatTime(current);
          progressFillEl.style.width = "20%";

          channelSubsEl.textContent = "Channel";
          videoAgeEl.textContent = ""; // could be filled via snippet if desired
        }
      } catch (err) {
        console.error("Video details error", err);
      }
    }

    function formatCount(n) {
      if (!n) return "0";
      const num = Number(n);
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + "M";
      if (num >= 1_000) return (num / 1_000).toFixed(1) + "K";
      return String(num);
    }

    function parseISO8601Duration(iso) {
      if (!iso) return 0;
      const match = iso.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      if (!match) return 0;
      const minutes = Number(match[1] || 0);
      const seconds = Number(match[2] || 0);
      return minutes * 60 + seconds;
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    // Tabs behavior
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const tabId = tab.dataset.tab;
        if (tabId === state.currentTab) return;

        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");

        state.currentTab = tabId;
        loadInitialForTab(tabId);
      });
    });

    // Search input: pressing Enter triggers search tab
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        state.currentTab = "search";
        tabs.forEach((t) => {
          t.classList.toggle("active", t.dataset.tab === "search");
        });
        loadInitialForTab("search");
      }
    });

    // Infinite scroll on right feed
    feedColumn.addEventListener("scroll", () => {
      const { scrollTop, scrollHeight, clientHeight } = feedColumn;
      const nearBottom = scrollTop + clientHeight >= scrollHeight - 40;
      if (nearBottom && !state.isLoading && state.pageTokens[state.currentTab]) {
        loadNextBatch(state.currentTab, false);
      }
    });

    // EMG pseudo integration
    emgLikeBtn.addEventListener("click", () => {
      if (!state.currentVideoId) return;
      console.log("EMG double‑pinch like for", state.currentVideoId);
    });

    emgVolumeBtn.addEventListener("click", () => {
      console.log("EMG wrist rotation volume gesture");
    });

    // Init: load Home tab and suggestions
