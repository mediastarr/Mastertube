<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewTube AR OS</title>

<style>

/* ═══════════════════════════════════════════════════
   GLOBAL RESET + BASE
   ═══════════════════════════════════════════════════ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

/* Scroll container for Ray‑Ban */
#vlistArea {
  position: absolute;
  top: 58px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  padding: 14px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.rtab {
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  transition: background .15s, border-color .15s;
}

.rtab.active,
.rtab:focus {
  background: rgba(0,150,255,0.22);
  border-color: rgba(0,180,255,0.55);
}

/* Video grid */
.vgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

/* Video card */
.vcard {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}

/* Focus ring for Ray‑Ban DPAD */
.focusable:focus {
  outline: 2px solid rgba(0,180,255,0.9);
  outline-offset: 3px;
}

/* ═══════════════════════════════════════════════════
   PLAYER AREA
   ═══════════════════════════════════════════════════ */
#playerArea {
  position: absolute;
  top: 58px;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 20px;
  display: none;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
}

#playerArea.show {
  display: flex;
}

#vidBoxInner {
  width: 100%;
  max-width: 720px;
  height: 360px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  margin-bottom: 14px;
}

/* ═══════════════════════════════════════════════════
   PLAYER CONTROLS (centered, shrink‑to‑fit)
   ═══════════════════════════════════════════════════ */
#pcontrols {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-bottom: 14px;
}

.pbtn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(0,150,255,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  color: #dff3ff;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .15s;
}

.pbtn:hover,
.pbtn:focus {
  background: rgba(0,150,255,0.22);
  border-color: rgba(0,180,255,0.55);
  transform: translateY(-2px);
}

.pbtn:active {
  transform: scale(0.96);
}

/* Play icon SVG */
#playIcon rect,
#playIcon polygon {
  fill: currentColor;
}

/* ═══════════════════════════════════════════════════
   PLAYER INFO
   ═══════════════════════════════════════════════════ */
#pinfo {
  width: 100%;
  max-width: 720px;
  margin-bottom: 20px;
}

#ptitle {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

#pmeta {
  font-size: 12px;
  color: #aaa;
}

/* Suggestions */
#suggArea {
  width: 100%;
  max-width: 720px;
}

.sc {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.sc:hover,
.sc:focus {
  background: rgba(0,150,255,0.18);
}

.sthumb {
  width: 80px;
  height: 50px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.sinfo {
  flex: 1;
}

.stitle {
  font-size: 14px;
  font-weight: 600;
}

.smeta {
  font-size: 11px;
  color: #aaa;
}

/* ═══════════════════════════════════════════════════
   FULLSCREEN PLAYER CONTROLS
   ═══════════════════════════════════════════════════ */
#fsPlayer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#fsPlayer.open {
  display: flex;
}

#fsCtrl {
  display: flex;
  gap: 14px;
  margin-top: 20px;
}

.fs-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(0,150,255,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  color: #dff3ff;
  cursor: pointer;
}

.fs-btn:hover,
.fs-btn:focus {
  background: rgba(0,150,255,0.22);
  border-color: rgba(0,180,255,0.55);
}

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     HOLOGRAPHIC HUD STATUS
     ═══════════════════════════════════════════════════ -->
<div id="floatingStatus" style="
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.45);
  padding:6px 14px;
  border-radius:10px;
  border:1px solid rgba(0,180,255,0.35);

">

<!-- ═══════════════════════════════════════════════════
     HOLOGRAPHIC DEPTH PARTICLES

<div id="depthParticles" style="

<div id="chromaLayer" style="

"></div>

<!-- ═══════════════════════════════════════════════════
     TOP NAV BAR
     ═══════════════════════════════════════════════════ -->
<div style="
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:58px;
  background:rgba(0,0,0,0.65);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;

  padding:0 14px;
  z-index:50;

  <!-- Left: App title -->

    ViewTube AR OS

  <div class="search-wrap" style="display:flex;align-items:center;gap:10px;position:relative;">

      ">

    <div id="sdd" style="

      border:1px solid rgba(255,255,255,0.12);

      z-index:200;
    "></div>

    <!-- Dots menu -->
    <div class="dots-wrap" style="position:relative;">
      <button id="dotsBtn" class="focusable" tabindex="0" onclick="toggleDots()" style="
        background:rgba(255,255,255,0.06);

        cursor:pointer;
      ">⋮</button>

      <div id="dotsMenu" class="dots-menu" style="

        background:rgba(0,0,0,0.85);
        border:1px solid rgba(255,255,255,0.12);
        border-radius:10px;
        padding:6px 0;
        display:none;
        flex-direction:column;
        z-index:200;
      ">
        <div class="di focusable" tabindex="0" style="padding:8px 12px;cursor:pointer;">Settings</div>
        <div class="di focusable" tabindex="0" style="padding:8px 12px;cursor:pointer;">About</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     TABS
     ═══════════════════════════════════════════════════ -->
<div class="tabs" style="margin-top:58px;">
  <div class="rtab focusable" data-tab="home" tabindex="0" onclick="switchTab('home')">Home</div>
  <div class="rtab focusable" data-tab="shorts" tabindex="0" onclick="switchTab('shorts')">Shorts</div>
  <div class="rtab focusable" data-tab="subs" tabindex="0" onclick="switchTab('subs')">Subscriptions</div>
  <div class="rtab focusable" data-tab="movies" tabindex="0" onclick="switchTab('movies')">Movies</div>
  <div class="rtab focusable" data-tab="history" tabindex="0" onclick="switchTab('history')">History</div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN GRID AREA
     ═══════════════════════════════════════════════════ -->
<div id="vlistArea">
  <div id="mainGrid"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     PLAYER AREA (controls centered, shrink-to-fit)
     ═══════════════════════════════════════════════════ -->
<div id="playerArea">

  <div id="vidBoxInner">
    <!-- Emoji / placeholder injected by JS -->
  </div>

  <!-- Centered, shrink-to-fit controls -->
  <div id="pcontrols">
    <button class="pbtn focusable" tabindex="0" onclick="togglePlay()" aria-label="Play/Pause">
      <svg id="playIcon" width="20" height="20" viewBox="0 0 20 20"></svg>
    </button>

    <button class="pbtn focusable" tabindex="0" onclick="seek(-10)" aria-label="Rewind 10 seconds">

    <button class="pbtn focusable" tabindex="0" onclick="seek(10)" aria-label="Forward 10 seconds">

      ⛶
    </button>

    <button class="pbtn focusable" tabindex="0" onclick="toggleHideUi()" aria-label="Hide UI">

    </button>
  </div>

  <div id="pinfo">
    <div id="ptitle"></div>
    <div id="pmeta"></div>
  </div>

  <div id="suggArea"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     FULLSCREEN PLAYER
     ═══════════════════════════════════════════════════ -->
<div id="fsPlayer">

  <div id="fsVid" style="
    font-size:80px;
    opacity:0.3;
    margin-bottom:20px;
  ">▶</div>

  <div id="fsTitle" style="font-size:20px;margin-bottom:20px;"></div>

  <div id="fsCtrl">
    <button class="fs-btn focusable" tabindex="0" onclick="togglePlay()" aria-label="Play/Pause">
      <svg id="fsPlayIcon" width="20" height="20" viewBox="0 0 20 20"></svg>
    </button>

    <button class="fs-btn focusable" tabindex="0" onclick="seek(-10)" aria-label="Rewind 10 seconds">⏪ 10s</button>

    <button class="fs-btn fs-back-btn focusable" tabindex="0" onclick="closeFs()" aria-label="Exit Fullscreen">← Back</button>

    <button class="fs-btn focusable" tabindex="0" onclick="toggleFsHide()" aria-label="Hide UI">👁</button>
  </div>

</div>
<!-- ═══════════════════════════════════════════════════

</div>

<!-- ═══════════════════════════════════════════════════

    ">Close</button>

</div>

<!-- ═══════════════════════════════════════════════════
     TOAST SYSTEM
     ═══════════════════════════════════════════════════ -->
<div id="toast" style="
  position:fixed;
  bottom:30px;
  left:50%;

  background:rgba(0,0,0,0.75);
  padding:8px 16px;
  border-radius:10px;
  border:1px solid rgba(0,180,255,0.35);
  font-size:13px;

<!-- ═══════════════════════════════════════════════════

  </div>

</div>
<!-- ═══════════════════════════════════════════════════
     AUTH POPUP (API KEY MODE FOR RAY‑BAN)
     ═══════════════════════════════════════════════════ -->
<div id="authPopup" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9998;
">

      cursor:pointer;

</div>

<!-- ═══════════════════════════════════════════════════
     RIGHT‑TAB CONTENT AREA (Subscriptions, Movies, History)

<div id="rtabContent" style="

"></div>

<!-- ═══════════════════════════════════════════════════

  </div>

  <div id="chVideos" class="vgrid"></div>

</div>
<script>
/* ═══════════════════════════════════════════════════
   GLOBAL STATE
   ═══════════════════════════════════════════════════ */
let curTab = 'home';
let curVid = null;
let miniOn = false;
let progTimer = null;

let homeBatch = 0;
let searchBatch = 0;
let subsBatch = 0;
let moviesBatch = 0;
let historyBatch = 0;

let _ytShortsPool = [];
let shortsIdx = 0;
let shortsLoadedCount = 0;
const SHORTS_BATCH = 6;

/* ═══════════════════════════════════════════════════
   TAB SWITCHING
   ═══════════════════════════════════════════════════ */
function switchTab(tab) {
  curTab = tab;

  document.querySelectorAll('.rtab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  document.getElementById('vlistArea').style.display = 'none';
  document.getElementById('rtabContent').style.display = 'none';
  document.getElementById('moviesArea').style.display = 'none';
  document.getElementById('historyArea').style.display = 'none';
  document.getElementById('channelPage').style.display = 'none';

  if (tab === 'home') {
    document.getElementById('vlistArea').style.display = '';
    renderHome();
  }
  else if (tab === 'shorts') {
    openShortsOverlay();
  }
  else if (tab === 'subs') {
    document.getElementById('rtabContent').style.display = '';
    renderRSubs();
  }
  else if (tab === 'movies') {
    document.getElementById('moviesArea').style.display = '';
    renderMovies();
  }
  else if (tab === 'history') {
    document.getElementById('historyArea').style.display = '';
    renderHistory();
  }
}

/* ═══════════════════════════════════════════════════
   MAIN GRID (HOME)
   ═══════════════════════════════════════════════════ */
function initMainGrid() {
  homeBatch = 0;
  document.getElementById('mainGrid').innerHTML = '';
  loadHomeBatch();
}

function loadHomeBatch() {
  const batch = getNextBatch('home');
  if (!batch.length) return;

  const html = `
    <div class="vgrid">
      ${batch.map(renderVCardYT).join('')}
    </div>
  `;

  document.getElementById('mainGrid').insertAdjacentHTML('beforeend', html);

  applyTilt();
  makeFocusable();
}

function renderHome() {
  if (homeBatch === 0) initMainGrid();
}

/* ═══════════════════════════════════════════════════
   VIDEO CARD RENDERERS
   ═══════════════════════════════════════════════════ */
function renderVCardYT(v) {
  return `
    <div class="vcard focusable" tabindex="0" onclick="openVideo('${v.id}')">
      <div style="
        width:100%;
        height:90px;
        background:rgba(255,255,255,0.08);
        border-radius:8px;
        margin-bottom:8px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:40px;
        opacity:0.4;
      ">▶</div>

      <div style="font-size:14px;font-weight:600;margin-bottom:4px;">
        ${v.title}
      </div>

      <div style="font-size:11px;color:#aaa;">
        ${v.channel}
      </div>
    </div>
  `;
}

function renderSuggCard(v) {
  return `
    <div class="sc focusable" tabindex="0" onclick="openVideo('${v.id}')">
      <div class="sthumb">▶</div>
      <div class="sinfo">
        <div class="stitle">${v.title}</div>
        <div class="smeta">${v.channel}</div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════
   OPEN VIDEO (PLAYER)
   ═══════════════════════════════════════════════════ */
function openVideo(id) {
  curVid = id;

  document.getElementById('playerArea').classList.add('show');
  document.getElementById('vlistArea').style.display = 'none';

  const v = findVideoById(id);
  if (!v) return;

  document.getElementById('vidBoxInner').textContent = '▶';
  document.getElementById('ptitle').textContent = v.title;
  document.getElementById('pmeta').textContent = v.channel;

  loadSuggestions(id);
  addToHistory(v);

  requestAnimationFrame(() => {
    const first = document.querySelector('#pcontrols .pbtn');
    if (first) first.focus();
  });
}

/* ═══════════════════════════════════════════════════
   SUGGESTIONS
   ═══════════════════════════════════════════════════ */
function loadSuggestions(id) {
  const sugg = getSuggestions(id);
  const html = sugg.map(renderSuggCard).join('');
  document.getElementById('suggArea').innerHTML = html;

  applyTilt();
  makeFocusable();
}

/* ═══════════════════════════════════════════════════
   HISTORY
   ═══════════════════════════════════════════════════ */
function addToHistory(v) {
  if (!window._history) window._history = [];
  window._history.unshift(v);
  if (window._history.length > 200) window._history.pop();
}

function renderHistory() {
  if (!window._history) return;
  const html = window._history.map(renderVCardYT).join('');
  document.getElementById('historyGrid').innerHTML = html;

  applyTilt();
  makeFocusable();
}
<script>
/* ═══════════════════════════════════════════════════
   SHORTS ENGINE
   ═══════════════════════════════════════════════════ */
function openShortsOverlay() {
  document.getElementById('shortsOverlay').style.display = 'flex';

  if (_ytShortsPool.length === 0) {
    _ytShortsPool = SHORTS.slice();
  }

  buildShortsTrackFromPool(true);
  shortsIdx = 0;
  goToShort(0, false);
}

function closeShortsOverlay() {
  document.getElementById('shortsOverlay').style.display = 'none';
  switchTab('home');
}

function buildShortsTrackFromPool(reset) {
  const track = document.getElementById('shortsTrack');
  if (reset) {
    track.innerHTML = '';
    shortsLoadedCount = 0;
  }

  const end = Math.min(shortsLoadedCount + SHORTS_BATCH, _ytShortsPool.length);
  for (let i = shortsLoadedCount; i < end; i++) {
    const s = _ytShortsPool[i];
    track.insertAdjacentHTML('beforeend', `
      <div class="short-slide focusable" tabindex="0" id="short-${i}" style="
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:80px;
        opacity:0.3;
      ">▶</div>
    `);
  }

  shortsLoadedCount = end;
  updateShortsDots();
  makeFocusable();
}

function updateShortsDots() {
  const dots = document.getElementById('shortsDots');
  dots.innerHTML = '';
  for (let i = 0; i < shortsLoadedCount; i++) {
    dots.insertAdjacentHTML('beforeend', `
      <div style="
        width:8px;height:8px;border-radius:50%;
        background:${i === shortsIdx ? 'rgba(0,180,255,0.9)' : 'rgba(255,255,255,0.25)'};
      "></div>
    `);
  }
}

function goToShort(i, animate = true) {
  if (i < 0 || i >= shortsLoadedCount) return;
  shortsIdx = i;

  const track = document.getElementById('shortsTrack');
  track.style.transition = animate ? 'transform .25s ease' : 'none';
  track.style.transform = `translateY(${-i * window.innerHeight}px)`;

  updateShortsDots();

  requestAnimationFrame(() => {
    const el = document.getElementById(`short-${i}`);
    if (el) el.focus();
  });
}

/* ═══════════════════════════════════════════════════
   MINI‑PLAYER
   ═══════════════════════════════════════════════════ */
function toggleMini() {
  miniOn = !miniOn;
  document.getElementById('miniPlayer').style.display = miniOn ? 'flex' : 'none';
}

/* ═══════════════════════════════════════════════════
   PLAYER CONTROLS
   ═══════════════════════════════════════════════════ */
function togglePlay() {
  const icon = document.getElementById('playIcon');
  const fsIcon = document.getElementById('fsPlayIcon');

  if (!window._playing) {
    window._playing = true;
    icon.innerHTML = '<rect x="4" y="4" width="4" height="12"></rect><rect x="12" y="4" width="4" height="12"></rect>';
    fsIcon.innerHTML = icon.innerHTML;
  } else {
    window._playing = false;
    icon.innerHTML = '<polygon points="5,4 15,10 5,16"></polygon>';
    fsIcon.innerHTML = icon.innerHTML;
  }
}

function seek(sec) {
  HoloFX.setStatus((sec > 0 ? '⏩ ' : '⏪ ') + Math.abs(sec) + 's', 1200);
}

function openFs() {
  document.getElementById('fsPlayer').classList.add('open');
  document.getElementById('playerArea').classList.remove('show');

  requestAnimationFrame(() => {
    const first = document.querySelector('#fsCtrl .fs-btn');
    if (first) first.focus();
  });
}

function closeFs() {
  document.getElementById('fsPlayer').classList.remove('open');
  document.getElementById('playerArea').classList.add('show');

  requestAnimationFrame(() => {
    const first = document.querySelector('#pcontrols .pbtn');
    if (first) first.focus();
  });
}

function toggleHideUi() {
  const pinfo = document.getElementById('pinfo');
  const sugg = document.getElementById('suggArea');
  const hidden = pinfo.style.display === 'none';

  pinfo.style.display = hidden ? '' : 'none';
  sugg.style.display = hidden ? '' : 'none';
}

function toggleFsHide() {
  const fsCtrl = document.getElementById('fsCtrl');
  fsCtrl.style.display = fsCtrl.style.display === 'none' ? 'flex' : 'none';
}

/* ═══════════════════════════════════════════════════
   DPAD MASTER HANDLER (Ray‑Ban EMG → Arrow Keys)
   ═══════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  const key = e.key;

  // Shorts navigation
  if (document.getElementById('shortsOverlay').style.display === 'flex') {
    if (key === 'ArrowDown') {
      goToShort(shortsIdx + 1);
      e.preventDefault();
      return;
    }
    if (key === 'ArrowUp') {
      goToShort(shortsIdx - 1);
      e.preventDefault();
      return;
    }
    if (key === 'Escape') {
      closeShortsOverlay();
      e.preventDefault();
      return;
    }
  }

  // Virtual keyboard
  if (document.getElementById('vkOverlay').style.display === 'flex') {
    VK.handleKey(e);
    return;
  }

  // Player fullscreen exit
  if (key === 'Escape' && document.getElementById('fsPlayer').classList.contains('open')) {
    closeFs();
    return;
  }

  // Global DPAD focus navigation
  const focusables = Array.from(document.querySelectorAll('.focusable'));
  const idx = focusables.indexOf(document.activeElement);

  if (idx === -1) {
    if (focusables[0]) focusables[0].focus();
    return;
  }

  let next = idx;

  if (key === 'ArrowDown') next = Math.min(idx + 1, focusables.length - 1);
  if (key === 'ArrowUp') next = Math.max(idx - 1, 0);
  if (key === 'ArrowLeft') next = Math.max(idx - 1, 0);
  if (key === 'ArrowRight') next = Math.min(idx + 1, focusables.length - 1);

  if (next !== idx) {
    focusables[next].focus();
    e.preventDefault();
  }
});

/* ═══════════════════════════════════════════════════
   INFINITE SCROLL OBSERVER
   ═══════════════════════════════════════════════════ */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      if (curTab === 'home') loadHomeBatch();
      if (curTab === 'subs') loadSubsBatch();
      if (curTab === 'movies') loadMoviesBatch();
      if (curTab === 'history') loadHistoryBatch();
      if (curTab === 'search') loadSearchBatch();
    }
  });
});

function attachInfiniteScroll() {
  const sentinel = document.createElement('div');
  sentinel.style.height = '40px';
  document.getElementById('vlistArea').appendChild(sentinel);
  io.observe(sentinel);
}
</script>
<script>
/* ═══════════════════════════════════════════════════
   VIRTUAL KEYBOARD ENGINE
   ═══════════════════════════════════════════════════ */
const VK = {
  cb: null,
  text: '',
  keys: [
    'Q','W','E','R','T','Y','U','I','O','P',
    'A','S','D','F','G','H','J','K','L','⌫',
    'Z','X','C','V','B','N','M','_','-','⏎'
  ],

  build() {
    const grid = document.getElementById('vkGrid');
    if (!grid) return;

    grid.innerHTML = '';
    this.keys.forEach(k => {
      grid.insertAdjacentHTML('beforeend', `
        <div class="vk-key focusable" tabindex="0" data-k="${k}" style="
          background:rgba(255,255,255,0.06);
          border:1px solid rgba(255,255,255,0.12);
          border-radius:8px;
          padding:10px;
          text-align:center;
          cursor:pointer;
        ">${k}</div>
      `);
    });

    makeFocusable();
  },

  open(initial, callback) {
    this.text = initial || '';
    this.cb = callback;
    document.getElementById('vkText').textContent = this.text;
    document.getElementById('vkOverlay').style.display = 'flex';

    requestAnimationFrame(() => {
      const first = document.querySelector('.vk-key');
      if (first) first.focus();
    });
  },

  close() {
    document.getElementById('vkOverlay').style.display = 'none';
  },

  press(k) {
    if (k === '⌫') {
      this.text = this.text.slice(0, -1);
    } else if (k === '⏎') {
      if (this.cb) this.cb(this.text);
      this.close();
      return;
    } else {
      this.text += k;
    }
    document.getElementById('vkText').textContent = this.text;
  },

  handleKey(e) {
    if (e.key === 'Enter') {
      const el = document.activeElement;
      if (el && el.dataset.k) this.press(el.dataset.k);
      return;
    }
    if (e.key === 'Escape') {
      this.close();
      return;
    }
  }
};

/* ═══════════════════════════════════════════════════
   SENSOR ENGINE (IMU + GPS)
   ═══════════════════════════════════════════════════ */
const MRBDSensors = {
  imu: false,
  gps: false,

  _updateSensorUI() {
    document.getElementById('imuDot').style.background =
      this.imu ? 'rgba(0,200,255,0.9)' : '#444';

    document.getElementById('gpsDot').style.background =
      this.gps ? 'rgba(0,200,255,0.9)' : '#444';
  }
};

/* ═══════════════════════════════════════════════════
   HOLOGRAPHIC FX ENGINE
   (Parallax, Bloom, Chroma, Audio Glow, Particles)
   ═══════════════════════════════════════════════════ */
const HoloFX = {
  statusTimer: null,

  init() {
    this.spawnParticles();
    this.startAudioGlow();
    this.startBloomBreath();
    this.bindMouse();
    this.setStatus('META RAY-BAN · HOLOGRAPHIC MODE');
  },

  setStatus(text, duration = 4000) {
    const el = document.getElementById('fstText');
    const wrap = document.getElementById('floatingStatus');
    if (!el || !wrap) return;

    el.textContent = text;
    wrap.style.opacity = '0.8';

    clearTimeout(this.statusTimer);
    if (duration > 0) {
      this.statusTimer = setTimeout(() => {
        wrap.style.opacity = '0.35';
        el.textContent = 'META RAY-BAN · HOLOGRAPHIC MODE';
      }, duration);
    }
  },

  spawnParticles() {
    const container = document.getElementById('depthParticles');
    if (!container) return;

    const colors = [
      'rgba(0,200,255,0.65)', 'rgba(0,160,255,0.55)',
      'rgba(180,80,255,0.45)', 'rgba(0,255,200,0.5)',
      'rgba(255,80,160,0.35)',
    ];

    for (let i = 0; i < 22; i++) {
      const dp = document.createElement('div');
      dp.className = 'dp';
      const size = 1 + Math.random() * 2.5;

      dp.style.cssText = `
        position:absolute;
        width:${size}px;
        height:${size}px;
        left:${4 + Math.random() * 92}%;
        top:${Math.random() * 100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        box-shadow:0 0 ${size*3}px ${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:50%;
        animation:float ${9 + Math.random() * 14}s linear infinite;
        animation-delay:${-Math.random() * 22}s;
      `;

      container.appendChild(dp);
    }
  },

  bindMouse() {
    let rafId = null;

    document.addEventListener('mousemove', e => {
      if (rafId) return;
      rafId = requestAnimationFrame(() => {
        rafId = null;

        const mx = e.clientX / window.innerWidth;
        const my = e.clientY / window.innerHeight;

        const bloom = document.getElementById('holoBloom');
        if (bloom) {
          bloom.style.background =
            `radial-gradient(ellipse 38% 28% at ${mx*100}% ${my*100}%, rgba(0,180,255,0.08) 0%, transparent 70%)`;
        }

        const chroma = document.getElementById('chromaLayer');
        if (chroma) {
          chroma.style.transform =
            `translate(${(mx-0.5)*14}px, ${(my-0.5)*9}px)`;
        }
      });
    });

    this.applyCardTilt();
  },

  applyCardTilt() {
    document.querySelectorAll('.vcard,.rcard,.movie-r,.pl-item,.sub-ch-item,.short-r,.sc')
      .forEach(card => {
        if (card._holoTilt) return;
        card._holoTilt = true;

        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const cx = (e.clientX - r.left) / r.width - 0.5;
          const cy = (e.clientY - r.top) / r.height - 0.5;

          const rotY = cx * 16;
          const rotX = -cy * 11;

          card.style.transform =
            `perspective(600px) rotateY(${rotY}deg) rotateX(${rotX}deg) translateZ(12px)`;
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform = '';
        });
      });
  },

  startAudioGlow() {
    const bar = document.getElementById('audioGlow');
    if (!bar) return;

    let t = 0;
    const tick = () => {
      t += 0.035;
      const p = 0.45 + Math.sin(t)*0.3 + Math.sin(t*2.4)*0.15;
      bar.style.opacity = p * 0.9;
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  },

  startBloomBreath() {
    let t = 0;
    const tick = () => {
      t += 0.006;
      const intensity = 0.04 + Math.sin(t)*0.015;
      const bloom = document.getElementById('holoBloom');
      if (bloom) bloom.style.opacity = String(intensity * 12);
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }
};

/* ═══════════════════════════════════════════════════
   STARTUP SEQUENCE
   ═══════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  initMainGrid();
  renderTab();
  VK.build();
  makeFocusable();
  MRBDSensors._updateSensorUI();
  HoloFX.init();

  attachInfiniteScroll();

  requestAnimationFrame(() => {
    const first = document.querySelector('.focusable');
    if (first) first.focus();
  });
});
</script>
