<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ViewTube AR – 10/90, Shorts Subpage, Controls</title>
  <meta name="viewport" content="width=600, initial-scale=1.0" />
  <style>
    :root {
      --panel-size: 600px;
      --accent: #ff0000;
      --text-main: #ffffff;
      --text-sub: #b3b3b3;
      --glass-bg: rgba(0, 0, 0, 0.55);
      --border-soft: rgba(255, 255, 255, 0.18);
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition-fast: 0.18s ease-out;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 600px;
      height: 600px;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    #ar-panel {
      position: relative;
      width: var(--panel-size);
      height: var(--panel-size);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
      background: transparent !important;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 0.1fr 0.9fr; /* 10 / 90 split */
      gap: 8px;
      padding: 8px 10px 6px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .left-sidebar {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--glass-bg);
      border: 1px solid var(--border-soft);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .vertical-tabs {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vtab-btn {
      width: 100%;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: rgba(0, 0, 0, 0.55);
      color: var(--text-sub);
      font-size: 11px;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast),
        border-color var(--transition-fast), transform var(--transition-fast);
    }

    .vtab-btn.active {
      background: rgba(0, 0, 0, 0.9);
      border-color: var(--accent);
      color: var(--text-main);
      transform: translateX(2px);
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-md);
      background: var(--glass-bg);
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
    }

    #search-input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-main);
      font-size: 11px;
      outline: none;
    }

    .login-btn {
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.8);
      color: var(--text-sub);
      font-size: 10px;
      cursor: pointer;
    }

    .feed-scroll {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--glass-bg);
      border: 1px solid var(--border-soft);
      padding: 6px;
      overflow-y: auto;
    }

    .feed-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .feed-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .feed-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .grid-card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast);
      padding: 4px;
    }

    .grid-card:hover {
      transform: translateY(-2px);
      background: rgba(0, 0, 0, 0.95);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
    }

    .grid-thumb {
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
    }

    .grid-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px 2px 4px;
    }

    .grid-title {
      font-size: 11px;
      font-weight: 600;
    }

    .grid-channel {
      font-size: 10px;
      color: var(--text-sub);
    }

    .grid-meta {
      font-size: 10px;
      color: var(--text-sub);
    }

    .player-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-card {
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.95);
      border: 1px solid var(--border-soft);
      padding: 6px;
      position: relative;
    }

    .player-video {
      position: sticky;
      top: 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #000 !important;
      z-index: 2;
    }

    #yt-player,
    #yt-shorts-player {
      width: 100%;
      height: 230px;
    }

    .player-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-top: 6px;
    }

    .player-title-block {
      flex: 1;
    }

    .video-title {
      font-size: 14px;
      font-weight: 600;
    }

    .video-meta {
      margin-top: 2px;
      font-size: 11px;
      color: var(--text-sub);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .channel-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .channel-name {
      font-size: 12px;
      font-weight: 600;
    }

    .channel-subs {
      font-size: 11px;
      color: var(--text-sub);
    }

    .subscribe-btn {
      padding: 5px 10px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }

    .close-player-btn {
      margin-top: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-sub);
      font-size: 10px;
      cursor: pointer;
    }

    .engagement-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .engage-btn {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-main);
      font-size: 11px;
      cursor: pointer;
    }

    .description-block {
      font-size: 11px;
      color: var(--text-sub);
      max-height: 80px;
      overflow: hidden;
      margin-top: 4px;
    }

    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .suggest-card {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 6px;
      padding: 6px;
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast);
    }

    .suggest-card:hover {
      transform: translateY(-2px);
      background: rgba(0, 0, 0, 0.98);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
    }

    .suggest-thumb {
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
    }

    .suggest-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .suggest-title {
      font-size: 11px;
      font-weight: 600;
    }

    .suggest-channel {
      font-size: 10px;
      color: var(--text-sub);
    }

    .suggest-meta {
      font-size: 10px;
      color: var(--text-sub);
    }

    .bottom-hud {
      padding: 6px 10px 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mini-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--border-soft);
    }

    .mini-thumb {
      width: 40px;
      height: 24px;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
      background-color: #222;
    }

    .mini-info {
      display: flex;
      flex-direction: column;
    }

    .mini-title {
      font-size: 10px;
    }

    .mini-channel {
      font-size: 9px;
      color: var(--text-sub);
    }

    .mini-controls {
      display: flex;
      gap: 6px;
      margin-left: 8px;
    }

    .mini-btn {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-sub);
      font-size: 9px;
      cursor: pointer;
    }

    .full-mode .main-layout,
    .full-mode .bottom-hud {
      display: none;
    }

    .full-mode #full-overlay {
      display: block;
    }

    #full-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 999;
      padding: 8px;
    }

    #full-overlay-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #full-player-container {
      flex: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #000;
    }

    #full-player-container iframe {
      width: 100%;
      height: 100%;
    }

    #full-close-btn {
      align-self: flex-end;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text-sub);
      font-size: 10px;
      cursor: pointer;
    }

    .mini-floating {
      position: fixed;
      bottom: 12px;
      left: 12px;
      width: 200px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="ar-panel">
    <main class="main-layout">
      <section class="left-panel">
        <div class="left-sidebar">
          <div class="vertical-tabs">
            <button class="vtab-btn active" data-tab="all">All</button>
            <button class="vtab-btn" data-tab="shorts">Shorts</button>
            <button class="vtab-btn" data-tab="movies">Movies</button>
            <button class="vtab-btn" data-tab="trending">Trending</button>
            <button class="vtab-btn" data-tab="history">History</button>
            <button class="vtab-btn" data-tab="subscriptions">Subscriptions</button>
            <button class="vtab-btn" data-tab="channel">Channel</button>
            <button class="vtab-btn" data-tab="playlist">Playlist</button>
          </div>
        </div>
      </section>

      <section class="right-panel">
        <div class="search-row">
          <input
            id="search-input"
            type="text"
            placeholder="Search"
            autocomplete="off"
          />
          <button class="login-btn" id="login-btn">Login</button>
        </div>

        <div class="feed-scroll" id="feed-scroll"></div>
      </section>
    </main>

    <div id="full-overlay">
      <div id="full-overlay-inner">
        <button id="full-close-btn">✕ Exit</button>
        <div id="full-player-container"></div>
      </div>
    </div>

    <footer class="bottom-hud">
      <div class="mini-player">
        <div class="mini-thumb" id="mini-thumb"></div>
        <div class="mini-info">
          <div class="mini-title" id="mini-title"></div>
          <div class="mini-channel" id="mini-channel"></div>
        </div>
        <div class="mini-controls">
          <button class="mini-btn" id="emg-like">Double‑pinch: Like</button>
          <button class="mini-btn" id="emg-volume">Rotate wrist: Volume</button>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const API_KEY = "AIzaSyCAsV7vK_lzvjYtJj5mPtz1l1WXIVhG9zc";
                    "AIzaSyAUKic3SobVT3S60-H9fWmdHZJVgdOzRPg";
                    "AIzaSyBwjcpX9eyHEDtJ5JwgEUb8EOF3YCePCMw";
                    "AIzaSyBt-fK0zc_H3I_lP2dKhU-Ti0vp__XiBj8";
                    "AIzaSyCv_FArQ3AD1J7-KwOX47f7BRuKO4OsveY";
                    "AIzaSyD-fAvJEBTJYcKmkl03G-JXTps8js9uMrE";
                    "AIzaSyDs2jIad2HCfY0o3j4kLFvducChpgv9qmU"
    const CLIENT_ID =
      "433136699735-guoa9ppvn132n8qecaukvoh336id7eg4.apps.googleusercontent.com";
    const CLIENT_SECRET = "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";

    const SEARCH_URL =
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=40";
    const VIDEO_URL =
      "https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails";

    const tabs = document.querySelectorAll(".vtab-btn");
    const feedScroll = document.getElementById("feed-scroll");
    const searchInput = document.getElementById("search-input");
    const loginBtn = document.getElementById("login-btn");
    const arPanel = document.getElementById("ar-panel");

    const miniThumbEl = document.getElementById("mini-thumb");
    const miniTitleEl = document.getElementById("mini-title");
    const miniChannelEl = document.getElementById("mini-channel");

    const emgLikeBtn = document.getElementById("emg-like");
    const emgVolumeBtn = document.getElementById("emg-volume");

    const fullOverlay = document.getElementById("full-overlay");
    const fullPlayerContainer = document.getElementById("full-player-container");
    const fullCloseBtn = document.getElementById("full-close-btn");

    let currentPlayer = null;
    let currentShortsPlayer = null;

    const state = {
      currentTab: "all",
      pageTokens: {
        all: null,
        shorts: null,
        movies: null,
        trending: null,
        history: null,
        subscriptions: null,
        channel: null,
        playlist: null,
        search: null,
      },
      isLoading: false,
      mode: "grid", // "grid" | "player" | "shorts" | "fullscreen" | "mini"
      items: [],
      currentVideoId: null,
      currentVideoItem: null,
      shortsIndex: 0,
      controlsHidden: false,
      resolution: "1080p",
      accessToken: null,
      refreshToken: null,
    };

    const watchedIds = new Set();
    const watchedChannels = new Set();

    function loadTokens() {
      state.accessToken = localStorage.getItem("yt_access_token");
      state.refreshToken = localStorage.getItem("yt_refresh_token");
    }

    function saveTokens(accessToken, refreshToken) {
      localStorage.setItem("yt_access_token", accessToken);
      localStorage.setItem("yt_refresh_token", refreshToken);
    }

    loadTokens();

    function personalizedQuery() {
      if (watchedChannels.size) {
        const topChannel = [...watchedChannels][0];
        return `${topChannel} latest uploads`;
      }
      return "YouTube home feed trending music tech vlog";
    }

    function defaultQueryForTab(tab) {
      switch (tab) {
        case "all":
          return personalizedQuery();
        case "shorts":
          return "shorts funny vertical viral";
        case "movies":
          return "full movie trailer official";
        case "trending":
          return "trending worldwide today";
        case "history":
          return "recent videos";
        case "subscriptions":
          return "latest uploads";
        case "channel":
          return "Truthunedited channel";
        case "playlist":
          return "my playlists";
        case "search":
          return searchInput.value.trim() || "music videos";
        default:
          return "YouTube home feed";
      }
    }

    function buildSearchUrl(tab) {
      const query = defaultQueryForTab(tab);
      let url = `${SEARCH_URL}&q=${encodeURIComponent(query)}&key=${API_KEY}`;
      const token = state.pageTokens[tab];
      if (token) {
        url += `&pageToken=${token}`;
      }
      return url;
    }

    async function loadInitialForTab(tab) {
      state.pageTokens[tab] = null;
      state.items = [];
      state.currentVideoId = null;
      state.currentVideoItem = null;
      state.mode = tab === "shorts" ? "shorts" : "grid";
      feedScroll.innerHTML = "";
      await loadNextBatch(tab, true);
    }

    async function loadNextBatch(tab, reset = false) {
      if (state.isLoading) return;
      state.isLoading = true;

      try {
        const url = buildSearchUrl(tab);
        const res = await fetch(url);
        const data = await res.json();

        state.pageTokens[tab] = data.nextPageToken || null;
        const items = data.items || [];

        if (reset) {
          state.items = items.slice();
        } else {
          state.items = state.items.concat(items);
        }

        if (state.mode === "grid") {
          renderGrid(state.items);
        } else if (state.mode === "player" && state.currentVideoItem) {
          renderPlayer(state.currentVideoItem, state.items);
        } else if (state.mode === "shorts") {
          renderShortsPage(state.items);
        }
      } catch (err) {
        console.error("YouTube search error", err);
      } finally {
        state.isLoading = false;
      }
    }

    function renderGrid(items) {
      state.mode = "grid";
      feedScroll.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "grid-2";

      items.forEach((item) => {
        const { snippet, id } = item;
        const videoId = id.videoId;

        const card = document.createElement("div");
        card.className = "grid-card";
        card.dataset.videoId = videoId;

        const thumb = document.createElement("div");
        thumb.className = "grid-thumb";
        thumb.style.backgroundImage = `url(${snippet.thumbnails.medium.url})`;

        const info = document.createElement("div");
        info.className = "grid-info";

        const title = document.createElement("div");
        title.className = "grid-title";
        title.textContent = snippet.title;

        const channel = document.createElement("div");
        channel.className = "grid-channel";
        channel.textContent = snippet.channelTitle;

        const meta = document.createElement("div");
        meta.className = "grid-meta";
        meta.textContent = formatMeta(snippet);

        info.appendChild(title);
        info.appendChild(channel);
        info.appendChild(meta);

        card.appendChild(thumb);
        card.appendChild(info);

        card.addEventListener("click", () => {
          openVideo(item);
        });

        grid.appendChild(card);
      });

      feedScroll.appendChild(grid);
    }

    function renderShortsPage(items) {
      state.mode = "shorts";
      feedScroll.innerHTML = "";

      if (!items.length) return;

      const idx = state.shortsIndex;
      const item = items[idx];
      const { snippet, id } = item;
      const videoId = id.videoId;

      const wrapper = document.createElement("div");
      wrapper.className = "player-wrapper";

      const playerCard = document.createElement("div");
      playerCard.className = "player-card";

      const playerVideo = document.createElement("div");
      playerVideo.className = "player-video";

      const playerContainer = document.createElement("div");
      playerContainer.id = "yt-shorts-player";

      playerVideo.appendChild(playerContainer);
      playerCard.appendChild(playerVideo);

      const controlsRow = document.createElement("div");
      controlsRow.className = "engagement-row";

      const playPauseBtn = document.createElement("button");
      playPauseBtn.className = "engage-btn";
      playPauseBtn.textContent = "Play/Pause";

      const ffBtn = document.createElement("button");
      ffBtn.className = "engage-btn";
      ffBtn.textContent = ">> 10s";

      const rwBtn = document.createElement("button");
      rwBtn.className = "engage-btn";
      rwBtn.textContent = "<< 10s";

      const fullBtn = document.createElement("button");
      fullBtn.className = "engage-btn";
      fullBtn.textContent = "Full";

      const hideUiBtn = document.createElement("button");
      hideUiBtn.className = "engage-btn";
      hideUiBtn.textContent = "Hide UI";

      const resBtn = document.createElement("button");
      resBtn.className = "engage-btn";
      resBtn.textContent = state.resolution;

      const miniBtn = document.createElement("button");
      miniBtn.className = "engage-btn";
      miniBtn.textContent = "Mini";

      controlsRow.appendChild(playPauseBtn);
      controlsRow.appendChild(ffBtn);
      controlsRow.appendChild(rwBtn);
      controlsRow.appendChild(fullBtn);
      controlsRow.appendChild(hideUiBtn);
      controlsRow.appendChild(resBtn);
      controlsRow.appendChild(miniBtn);

      playerCard.appendChild(controlsRow);

      const headerRow = document.createElement("div");
      headerRow.className = "player-header-row";

      const titleBlock = document.createElement("div");
      titleBlock.className = "player-title-block";

      const videoTitleEl = document.createElement("div");
      videoTitleEl.className = "video-title";
      videoTitleEl.textContent = snippet.title;

      const videoMetaEl = document.createElement("div");
      videoMetaEl.className = "video-meta";
      videoMetaEl.textContent = snippet.channelTitle;

      titleBlock.appendChild(videoTitleEl);
      titleBlock.appendChild(videoMetaEl);

      const channelBlock = document.createElement("div");
      channelBlock.className = "channel-block";

      const backBtn = document.createElement("button");
      backBtn.className = "close-player-btn";
      backBtn.textContent = "← Home";
      backBtn.addEventListener("click", () => {
        state.mode = "grid";
        loadInitialForTab("all");
      });

      channelBlock.appendChild(backBtn);

      headerRow.appendChild(titleBlock);
      headerRow.appendChild(channelBlock);

      playerCard.appendChild(headerRow);
      wrapper.appendChild(playerCard);

      const suggestionsList = document.createElement("div");
      suggestionsList.className = "suggestions-list";

      items.forEach((sItem, index) => {
        if (index === idx) return;
        const sCard = document.createElement("div");
        sCard.className = "suggest-card";

        const sThumb = document.createElement("div");
        sThumb.className = "suggest-thumb";
        sThumb.style.backgroundImage = `url(${sItem.snippet.thumbnails.medium.url})`;

        const sInfo = document.createElement("div");
        sInfo.className = "suggest-info";

        const sTitle = document.createElement("div");
        sTitle.className = "suggest-title";
        sTitle.textContent = sItem.snippet.title;

        const sChannel = document.createElement("div");
        sChannel.className = "suggest-channel";
        sChannel.textContent = sItem.snippet.channelTitle;

        const sMeta = document.createElement("div");
        sMeta.className = "suggest-meta";
        sMeta.textContent = formatMeta(sItem.snippet);

        sInfo.appendChild(sTitle);
        sInfo.appendChild(sChannel);
        sInfo.appendChild(sMeta);

        sCard.appendChild(sThumb);
        sCard.appendChild(sInfo);

        sCard.addEventListener("click", () => {
          state.shortsIndex = index;
          renderShortsPage(state.items);
        });

        suggestionsList.appendChild(sCard);
      });

      wrapper.appendChild(suggestionsList);
      feedScroll.appendChild(wrapper);

      if (!currentShortsPlayer) {
        currentShortsPlayer = new YT.Player("yt-shorts-player", {
          videoId,
          playerVars: { autoplay: 1, playsinline: 1 },
        });
      } else {
        currentShortsPlayer.loadVideoById(videoId);
      }

      playPauseBtn.addEventListener("click", () => {
        if (!currentShortsPlayer) return;
        const st = currentShortsPlayer.getPlayerState();
        if (st === YT.PlayerState.PLAYING) currentShortsPlayer.pauseVideo();
        else currentShortsPlayer.playVideo();
      });

      ffBtn.addEventListener("click", () => {
        if (!currentShortsPlayer) return;
        const t = currentShortsPlayer.getCurrentTime();
        currentShortsPlayer.seekTo(t + 10, true);
      });

      rwBtn.addEventListener("click", () => {
        if (!currentShortsPlayer) return;
        const t = currentShortsPlayer.getCurrentTime();
        currentShortsPlayer.seekTo(Math.max(0, t - 10), true);
      });

      fullBtn.addEventListener("click", () => {
        enterFullScreen(videoId, true);
      });

      hideUiBtn.addEventListener("click", () => {
        state.controlsHidden = !state.controlsHidden;
        const shouldHide = state.controlsHidden;
        [controlsRow, headerRow].forEach((el) => {
          if (!el) return;
          el.style.display = shouldHide ? "none" : "";
        });
        hideUiBtn.textContent = shouldHide ? "Show UI" : "Hide UI";
      });

      resBtn.addEventListener("click", () => {
        const order = ["720p", "1080p", "1440p"];
        const idxRes = order.indexOf(state.resolution);
        const next = order[(idxRes + 1) % order.length];
        state.resolution = next;
        resBtn.textContent = next;
      });

      miniBtn.addEventListener("click", () => {
        playerCard.classList.add("mini-floating");
        loadInitialForTab("all");
      });
    }

    function renderPlayer(selectedItem, items) {
      state.mode = "player";
      state.currentVideoItem = selectedItem;
      const { snippet, id } = selectedItem;
      const videoId = id.videoId;
      state.currentVideoId = videoId;

      watchedIds.add(videoId);
      watchedChannels.add(snippet.channelTitle);

      feedScroll.innerHTML = "";

      const wrapper = document.createElement("div");
      wrapper.className = "player-wrapper";

      const playerCard = document.createElement("div");
      playerCard.className = "player-card";

      const playerVideo = document.createElement("div");
      playerVideo.className = "player-video";

      const playerContainer = document.createElement("div");
      playerContainer.id = "yt-player";

      playerVideo.appendChild(playerContainer);
      playerCard.appendChild(playerVideo);

      const controlsRow = document.createElement("div");
      controlsRow.className = "engagement-row";

      const playPauseBtn = document.createElement("button");
      playPauseBtn.className = "engage-btn";
      playPauseBtn.textContent = "Play/Pause";

      const ffBtn = document.createElement("button");
      ffBtn.className = "engage-btn";
      ffBtn.textContent = ">> 10s";

      const rwBtn = document.createElement("button");
      rwBtn.className = "engage-btn";
      rwBtn.textContent = "<< 10s";

      const fullBtn = document.createElement("button");
      fullBtn.className = "engage-btn";
      fullBtn.textContent = "Full";

      const hideUiBtn = document.createElement("button");
      hideUiBtn.className = "engage-btn";
      hideUiBtn.textContent = "Hide UI";

      const resBtn = document.createElement("button");
      resBtn.className = "engage-btn";
      resBtn.textContent = state.resolution;

      const miniBtn = document.createElement("button");
      miniBtn.className = "engage-btn";
      miniBtn.textContent = "Mini";

      controlsRow.appendChild(playPauseBtn);
      controlsRow.appendChild(ffBtn);
      controlsRow.appendChild(rwBtn);
      controlsRow.appendChild(fullBtn);
      controlsRow.appendChild(hideUiBtn);
      controlsRow.appendChild(resBtn);
      controlsRow.appendChild(miniBtn);

      playerCard.appendChild(controlsRow);

      const headerRow = document.createElement("div");
      headerRow.className = "player-header-row";

      const titleBlock = document.createElement("div");
      titleBlock.className = "player-title-block";

      const videoTitleEl = document.createElement("div");
      videoTitleEl.className = "video-title";
      videoTitleEl.textContent = snippet.title;

      const videoMetaEl = document.createElement("div");
      videoMetaEl.className = "video-meta";
      const viewsSpan = document.createElement("span");
      const dotSpan = document.createElement("span");
      dotSpan.textContent = "•";
      const ageSpan = document.createElement("span");
      ageSpan.textContent = formatMeta(snippet);

      videoMetaEl.appendChild(viewsSpan);
      videoMetaEl.appendChild(dotSpan);
      videoMetaEl.appendChild(ageSpan);

      titleBlock.appendChild(videoTitleEl);
      titleBlock.appendChild(videoMetaEl);

      const channelBlock = document.createElement("div");
      channelBlock.className = "channel-block";

      const channelNameEl = document.createElement("div");
      channelNameEl.className = "channel-name";
      channelNameEl.textContent = snippet.channelTitle;

      const channelSubsEl = document.createElement("div");
      channelSubsEl.className = "channel-subs";
      channelSubsEl.textContent = "Channel";

      const subscribeBtn = document.createElement("button");
      subscribeBtn.className = "subscribe-btn";
      subscribeBtn.textContent = "Subscribe";

      const closeBtn = document.createElement("button");
      closeBtn.className = "close-player-btn";
      closeBtn.textContent = "✕ Home";
      closeBtn.addEventListener("click", () => {
        closePlayer();
      });

      channelBlock.appendChild(channelNameEl);
      channelBlock.appendChild(channelSubsEl);
      channelBlock.appendChild(subscribeBtn);
      channelBlock.appendChild(closeBtn);

      headerRow.appendChild(titleBlock);
      headerRow.appendChild(channelBlock);

      playerCard.appendChild(headerRow);

      const engagementRow = document.createElement("div");
      engagementRow.className = "engagement-row";

      const likeBtn = document.createElement("button");
      likeBtn.className = "engage-btn";
      likeBtn.textContent = "👍 0";

      const shareBtn = document.createElement("button");
      shareBtn.className = "engage-btn";
      shareBtn.textContent = "↗ Share";

      const saveBtn = document.createElement("button");
      saveBtn.className = "engage-btn";
      saveBtn.textContent = "💾 Save";

      engagementRow.appendChild(likeBtn);
      engagementRow.appendChild(shareBtn);
      engagementRow.appendChild(saveBtn);

      playerCard.appendChild(engagementRow);

      const descBlock = document.createElement("div");
      descBlock.className = "description-block";
      descBlock.textContent = snippet.description || "";
      playerCard.appendChild(descBlock);

      wrapper.appendChild(playerCard);

      const suggestionsList = document.createElement("div");
      suggestionsList.className = "suggestions-list";

      state.items.forEach((item) => {
        if (item.id.videoId === videoId) return;
        const sCard = document.createElement("div");
        sCard.className = "suggest-card";

        const sThumb = document.createElement("div");
        sThumb.className = "suggest-thumb";
        sThumb.style.backgroundImage = `url(${item.snippet.thumbnails.medium.url})`;

        const sInfo = document.createElement("div");
        sInfo.className = "suggest-info";

        const sTitle = document.createElement("div");
        sTitle.className = "suggest-title";
        sTitle.textContent = item.snippet.title;

        const sChannel = document.createElement("div");
        sChannel.className = "suggest-channel";
        sChannel.textContent = item.snippet.channelTitle;

        const sMeta = document.createElement("div");
        sMeta.className = "suggest-meta";
        sMeta.textContent = formatMeta(item.snippet);

        sInfo.appendChild(sTitle);
        sInfo.appendChild(sChannel);
        sInfo.appendChild(sMeta);

        sCard.appendChild(sThumb);
        sCard.appendChild(sInfo);

        sCard.addEventListener("click", () => {
          openVideo(item);
        });

        suggestionsList.appendChild(sCard);
      });

      wrapper.appendChild(suggestionsList);
      feedScroll.appendChild(wrapper);

      miniThumbEl.style.backgroundImage = `url(${snippet.thumbnails.default.url})`;
      miniTitleEl.textContent = snippet.title;
      miniChannelEl.textContent = snippet.channelTitle;

      loadVideoDetails(videoId, viewsSpan, likeBtn);

      if (!currentPlayer) {
        currentPlayer = new YT.Player("yt-player", {
          videoId,
          playerVars: { autoplay: 0 },
        });
      } else {
        currentPlayer.loadVideoById(videoId);
      }

      playPauseBtn.addEventListener("click", () => {
        if (!currentPlayer) return;
        const st = currentPlayer.getPlayerState();
        if (st === YT.PlayerState.PLAYING) currentPlayer.pauseVideo();
        else currentPlayer.playVideo();
      });

      ffBtn.addEventListener("click", () => {
        if (!currentPlayer) return;
        const t = currentPlayer.getCurrentTime();
        currentPlayer.seekTo(t + 10, true);
      });

      rwBtn.addEventListener("click", () => {
        if (!currentPlayer) return;
        const t = currentPlayer.getCurrentTime();
        currentPlayer.seekTo(Math.max(0, t - 10), true);
      });

      fullBtn.addEventListener("click", () => {
        enterFullScreen(videoId, false);
      });

      hideUiBtn.addEventListener("click", () => {
        state.controlsHidden = !state.controlsHidden;
        const shouldHide = state.controlsHidden;
        [controlsRow, engagementRow, closeBtn, resBtn, miniBtn].forEach((el) => {
          if (!el) return;
          el.style.display = shouldHide ? "none" : "";
        });
        hideUiBtn.textContent = shouldHide ? "Show UI" : "Hide UI";
      });

      resBtn.addEventListener("click", () => {
        const order = ["720p", "1080p", "1440p"];
        const idxRes = order.indexOf(state.resolution);
        const next = order[(idxRes + 1) % order.length];
        state.resolution = next;
        resBtn.textContent = next;
      });

      miniBtn.addEventListener("click", () => {
        playerCard.classList.add("mini-floating");
        loadInitialForTab("all");
      });
    }

    async function loadVideoDetails(videoId, viewsSpan, likeBtn) {
      try {
        const url = `${VIDEO_URL}&id=${videoId}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        const video = data.items?.[0];
        if (video) {
          const stats = video.statistics || {};
          viewsSpan.textContent = stats.viewCount
            ? `${formatCount(stats.viewCount)} views`
            : "Views unknown";
          likeBtn.textContent = `👍 ${formatCount(stats.likeCount)}`;
        }
      } catch (err) {
        console.error("Video details error", err);
      }
    }

    function openVideo(item) {
      renderPlayer(item, state.items);
    }

    function closePlayer() {
      state.currentVideoId = null;
      state.currentVideoItem = null;
      state.mode = "grid";
      renderGrid(state.items);
    }

    function formatMeta(snippet) {
      const published = new Date(snippet.publishedAt);
      const age = timeAgo(published);
      return `${age}`;
    }

    function timeAgo(date) {
      const diff = (Date.now() - date.getTime()) / 1000;
      const days = Math.floor(diff / 86400);
      if (days < 1) return "Today";
      if (days === 1) return "1 day ago";
      if (days < 30) return `${days} days ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months} months ago`;
      const years = Math.floor(months / 12);
      return `${years} years ago`;
    }

    function formatCount(n) {
      if (!n) return "0";
      const num = Number(n);
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + "M";
      if (num >= 1_000) return (num / 1_000).toFixed(1) + "K";
      return String(num);
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const tabId = tab.dataset.tab;
        if (tabId === state.currentTab) return;

        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");

        state.currentTab = tabId;
        if (tabId === "history") {
          loadInitialForTab("all");
        } else {
          loadInitialForTab(tabId);
        }
      });
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        state.currentTab = "search";
        tabs.forEach((t) => t.classList.remove("active"));
        loadInitialForTab("search");
      }
    });

    feedScroll.addEventListener("scroll", () => {
      const { scrollTop, scrollHeight, clientHeight } = feedScroll;
      const nearBottom = scrollTop + clientHeight >= scrollHeight - 40;
      if (nearBottom && !state.isLoading && state.pageTokens[state.currentTab]) {
        loadNextBatch(state.currentTab);
      }
    });

    let touchStartY = null;

    feedScroll.addEventListener("touchstart", (e) => {
      if (state.mode !== "shorts") return;
      touchStartY = e.touches[0].clientY;
    });

    feedScroll.addEventListener("touchend", (e) => {
      if (state.mode !== "shorts" || touchStartY === null) return;
      const endY = e.changedTouches[0].clientY;
      const delta = endY - touchStartY;

      if (Math.abs(delta) < 40) {
        touchStartY = null;
        return;
      }

      if (delta < 0) {
        if (state.shortsIndex < state.items.length - 1) {
          state.shortsIndex++;
          renderShortsPage(state.items);
        } else if (state.pageTokens.shorts && !state.isLoading) {
          loadNextBatch("shorts").then(() => {
            state.shortsIndex++;
            renderShortsPage(state.items);
          });
        }
      } else {
        if (state.shortsIndex > 0) {
          state.shortsIndex--;
          renderShortsPage(state.items);
        }
      }

      touchStartY = null;
    });

    emgLikeBtn.addEventListener("click", () => {
      if (!state.currentVideoId) return;
      console.log("EMG double‑pinch like for", state.currentVideoId);
    });

    emgVolumeBtn.addEventListener("click", () => {
      console.log("EMG wrist rotation volume gesture");
    });

    loginBtn.addEventListener("click", () => {
      const redirectUri = window.location.origin + "/callback";
      const params = new URLSearchParams({
        client_id: CLIENT_ID,
        redirect_uri: redirectUri,
        response_type: "code",
        scope: "https://www.googleapis.com/auth/youtube.readonly",
        access_type: "offline",
        prompt: "consent",
      });
      window.location.href =
        "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
    });

    function enterFullScreen(videoId, isShorts) {
      arPanel.classList.add("full-mode");
      fullOverlay.style.display = "block";
      fullPlayerContainer.innerHTML = "";
      const fullDiv = document.createElement("div");
      fullDiv.id = "full-player";
      fullPlayerContainer.appendChild(fullDiv);

      const player = isShorts ? currentShortsPlayer : currentPlayer;
      if (player) {
        player.loadVideoById(videoId);
        player.setSize(fullPlayerContainer.clientWidth, fullPlayerContainer.clientHeight);
      } else {
        new YT.Player("full-player", {
          videoId,
          playerVars: { autoplay: 1 },
        });
      }
    }

    fullCloseBtn.addEventListener("click", () => {
      arPanel.classList.remove("full-mode");
      fullOverlay.style.display = "none";
    });

    function onYouTubeIframeAPIReady() {
      loadInitialForTab("all");
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
  </script>
</body>
</html>
