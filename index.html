<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ViewTube – Fullscreen Player + Search</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  font-family: system-ui, sans-serif;
  color: #fff;
}

#root {
  width: 600px;
  height: 600px;
  position: relative;
  overflow: hidden;
}

.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: #111;
  border-bottom: 1px solid #222;
}

.tabs {
  display: flex;
  overflow-x: auto;
  white-space: nowrap;
  background: #111;
  border-bottom: 1px solid #222;
}

.tab {
  padding: 10px 14px;
  cursor: pointer;
  opacity: 0.7;
}

.tab.active {
  opacity: 1;
  font-weight: 700;
  border-bottom: 2px solid red;
}

#search-bar-wrapper {
  display: none;
  padding: 10px;
  background: #111;
}

#search-input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
  font-size: 16px;
}

.content {
  height: calc(100% - 160px);
  overflow-y: auto;
  padding: 10px;
}

.video {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid #222;
  cursor: pointer;
}

.video.highlight {
  background: #333;
}

.thumb img {
  width: 120px;
  height: 70px;
  object-fit: cover;
}

#player-screen {
  display: none;
  flex-direction: column;
  height: 100%;
}

#player-container {
  flex: 1;
  background: #000;
}

#player-controls {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: #111;
  border-top: 1px solid #222;
}

.player-btn {
  padding: 10px 14px;
  background: #222;
  border: none;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

#keyboard {
  display: none;
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
}

.kb-row {
  display: flex;
  justify-content: center;
  margin-bottom: 6px;
}

.kb-key {
  padding: 10px 14px;
  margin: 3px;
  background: #222;
  border-radius: 6px;
  cursor: pointer;
}

.kb-key.wide {
  width: 80px;
  text-align: center;
}

.kb-key.space {
  width: 160px;
  text-align: center;
}
</style>
</head>

<body>
<div id="root">

  <!-- MAIN UI -->
  <div id="main-ui">
    <div class="banner">
      <div style="font-size:18px;font-weight:700">ViewTube</div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="all">All</div>
      <div class="tab" data-tab="shorts">Shorts</div>
      <div class="tab" data-tab="news">News</div>
      <div class="tab" data-tab="anime">Anime</div>
      <div class="tab" data-tab="live">Live</div>
      <div class="tab" data-tab="movies">Movies</div>
      <div class="tab" data-tab="comedy">Comedy</div>
      <div class="tab" data-tab="search">Search</div>
    </div>

    <div id="search-bar-wrapper">
      <input id="search-input" type="text" placeholder="Search YouTube (US)" />
    </div>

    <div class="content" id="content"></div>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div id="player-screen">
    <div id="player-container">
      <div id="player"></div>
    </div>
    <div id="player-controls">
      <button class="player-btn" data-action="back10">⏪ Back 10s</button>
      <button class="player-btn" data-action="playpause">⏯ Play/Pause</button>
      <button class="player-btn" data-action="forward10">⏩ Forward 10s</button>
      <button class="player-btn" data-action="goback">⬅ Go Back</button>
    </div>
  </div>

  <!-- FLOATING KEYBOARD -->
  <div id="keyboard">
    <div class="kb-row">
      <div class="kb-key">Q</div><div class="kb-key">W</div><div class="kb-key">E</div><div class="kb-key">R</div><div class="kb-key">T</div>
      <div class="kb-key">Y</div><div class="kb-key">U</div><div class="kb-key">I</div><div class="kb-key">O</div><div class="kb-key">P</div>
    </div>
    <div class="kb-row">
      <div class="kb-key">A</div><div class="kb-key">S</div><div class="kb-key">D</div><div class="kb-key">F</div><div class="kb-key">G</div>
      <div class="kb-key">H</div><div class="kb-key">J</div><div class="kb-key">K</div><div class="kb-key">L</div>
    </div>
    <div class="kb-row">
      <div class="kb-key">Z</div><div class="kb-key">X</div><div class="kb-key">C</div><div class="kb-key">V</div><div class="kb-key">B</div>
      <div class="kb-key">N</div><div class="kb-key">M</div>
      <div class="kb-key wide" data-special="backspace">⌫</div>
    </div>
    <div class="kb-row">
      <div class="kb-key wide" data-special="clear">CLR</div>
      <div class="kb-key space" data-special="space">SPACE</div>
      <div class="kb-key wide" data-special="enter">ENTER</div>
    </div>
  </div>

</div> <!-- closes keyboard -->
</div> <!-- closes main-ui -->
</div> <!-- closes root -->

<script src="https://www.youtube.com/iframe_api"></script>
<script>

/* ALL API KEYS — INCLUDING YOUR 4 NEW ONES */
const KEYS = [
  "AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
  "AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI",
  "AIzaSyApAIjVvwL8DQMe5-B5z815hdJtpj3YLDg",
  "AIzaSyAUKic3SobVT3S60-H9fWmdHZJVgdOzRPg",
  "AIzaSyB7FKzBZCxfl4nwi6elI6wj-JCVXXtmA40",
  "AIzaSyBTUdLTpyYG0-fuOUP1OkeX9tf06S-rVkY",
  "AIzaSyAJbkJYrguKWmBl7Vyd6ObPXZf0zu8-p3E",
  "AIzaSyCz8qs_I_hbgfLZXZj9QMX1sO74hF5k84Q",
  "AIzaSyCAM-BEIynJUz3dkhRWOCrs3cdh5KJbbro",
  "AIzaSyCQsQnRJB6KgGKnSpGD66v6HNwikLUdFQ8",
  "AIzaSyCb6lnHEoOXWd0TWfJK71T_mOiM8O2kfrI",
  "AIzaSyC6qu4BiEbQJ1uoy49GcvAy9_QxHKUE6Go",
  "AIzaSyAtk1KIeZ9kFLNfhrqgNhmPzU4VJqTPeR8",
  "AIzaSyCkq9rnLzqpfnr-LHUg-1AuIDb-GkWukPM",
  "AIzaSyCzjoJptOBNzhkaxnNrkDZRP4SzsmTgTKQ",
  "AIzaSyBt2YQ-X408_Ep3EYV4B70SgXeeADe_L08",
  "AIzaSyCiEMfafGEgqpZ94b9ENjAg0UaIku0NRE8",
  "AIzaSyA0prh1a0eN4fZ6MA_eB4MPJ0UH4LPsIAc",
  "AIzaSyDiisGuMjbilWyxKAFpTPu4am8d5yQagJI",
  "AIzaSyDI3sl7QYBrXOgAwCyjwJ23pV1nbjUMVL0",
  "AIzaSyD_Jfk_5wuEdVhDEsQX9uy3BW2Fio7xe0s",
  "AIzaSyCpAzwCaG2I8gEusAsDKnkoxVMdkPg1Vpk",

  /* ⭐ YOUR NEW KEYS ADDED SAFELY ⭐ */
  "AIzaSyCJ2cLDhXE-e_KYbnfS7DmrT-gtbL9yxCY",
  "AIzaSyA2DSf373Pmv26YLpcv2gnUMeZd0bGgNug",
  "AIzaSyC-66qDbGqKdEfQyGFeQPgYpRCjg802eLQ",
  "AIzaSyBE_TgXpbeBMrkZhEGeEI3nZ5xC_BbbSd0"
];

let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

/* DOM */
const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const mainUI = document.getElementById("main-ui");
const playerScreen = document.getElementById("player-screen");
const playerControls = document.getElementById("player-controls");
const searchBarWrapper = document.getElementById("search-bar-wrapper");
const searchInput = document.getElementById("search-input");
const keyboard = document.getElementById("keyboard");

/* STATE */
let currentQuery = "";
let nextPageToken = null;
let highlightIndex = -1;
let ytPlayer = null;
let playerMode = false;
let currentTab = "all";
let keyboardActive = false;
let userHasNavigated = false;

/* PLAYER INIT */
function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player("player", {
    height: "100%",
    width: "100%",
    videoId: "",
    playerVars: { controls: 1, rel: 0 }
  });
}

/* SEARCH */
async function ytSearch(q, pageToken=null, maxResults=25, extra=""){
  let base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video" +
    "&regionCode=US&relevanceLanguage=en&safeSearch=none" +
    "&maxResults=" + maxResults +
    "&q=" + encodeURIComponent(q) +
    "&key=" + apiKey();

  if(extra) base += "&" + extra;
  if(pageToken) base += "&pageToken=" + pageToken;

  const r = await fetch(base);
  const j = await r.json();

  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}

/* LOAD QUERY */
async function loadQuery(q, maxResults=25, extra=""){
  currentQuery = q;
  nextPageToken = null;

  const items = await ytSearch(q, null, maxResults, extra);

  if(!items || items.length === 0){
    highlightIndex = -1;
  }

  showVideos(items, false);
}

/* RENDER VIDEOS */
function showVideos(items, append){
  if(!append){
    content.innerHTML = "";
    highlightIndex = -1;  /* ⭐ FIXED: no auto‑highlight on tab switch */
  }

  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = sn.thumbnails?.medium?.url || "";

    const div = document.createElement("div");
    div.className = "video";
    div.dataset.videoId = id;
    div.onclick = ()=>openVideo(id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div>${sn.title}</div>
        <div style="font-size:12px;opacity:0.7">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });

  applyHighlight();
}

/* APPLY HIGHLIGHT */
function applyHighlight(){
  const cards = [...content.querySelectorAll(".video")];
  cards.forEach(c=>c.classList.remove("highlight"));

  if(highlightIndex < 0 || highlightIndex >= cards.length) return;

  const card = cards[highlightIndex];
  card.classList.add("highlight");
  card.scrollIntoView({block:"center", behavior:"smooth"});
}

/* SCROLL */
content.addEventListener("scroll", ()=>{
  if(currentTab === "search"){
    highlightIndex = -1;
    hideKeyboard();
    searchInput.blur();
  }

  if(content.scrollTop + content.clientHeight >= content.scrollHeight - 40){
    loadMore();
  }
});

/* US‑ONLY SEARCH — FIXED */
async function ytSearch(q, pageToken = null, maxResults = 25, extra = "") {

  // ⭐ FIX: YouTube returns ZERO results when q = ""  
  // So we give it a safe default query.
  const query = q && q.trim() ? q : "popular videos";

  let base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video" +
    "&regionCode=US&relevanceLanguage=en&safeSearch=none" +
    "&maxResults=" + maxResults +
    "&q=" + encodeURIComponent(query) +
    "&key=" + apiKey();

  if (extra) base += "&" + extra;
  if (pageToken) base += "&pageToken=" + pageToken;

  const r = await fetch(base);
  const j = await r.json();

  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}


/* TAB SWITCHING — FIXED */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  currentTab = t.dataset.tab;
  nextPageToken = null;
  highlightIndex = -1;
  userHasNavigated = false;
  content.innerHTML = "";

  if(currentTab === "search"){
    searchBarWrapper.style.display = "block";
  } else {
    searchBarWrapper.style.display = "none";
    hideKeyboard();
  }

  let q="", max=25, extra="";

  if(currentTab === "all"){
    q = "";
    max = 50;
    extra = "videoDuration=medium&order=viewCount";
  }

  if(currentTab === "shorts"){
    q = "";
    max = 50;
    extra = "videoDuration=short&order=date";
  }

  if(currentTab === "news"){ q="US news"; max=40; }
  if(currentTab === "anime"){ q="anime english dub"; max=40; }
  if(currentTab === "live"){ q="live stream"; max=40; extra="eventType=live"; }
  if(currentTab === "movies"){ q="full movie free"; max=40; extra="videoDuration=long"; }
  if(currentTab === "comedy"){ q="stand up comedy"; max=40; }

  if(currentTab !== "search"){
    await loadQuery(q, max, extra);
  }
});

/* OPEN VIDEO */
function openVideo(id){
  hideKeyboard();
  searchInput.blur();
  playerMode = true;
  mainUI.style.display = "none";
  playerScreen.style.display = "flex";
  ytPlayer.loadVideoById(id);
  ytPlayer.playVideo();
}

/* CLOSE PLAYER */
function closePlayer(){
  playerMode = false;
  playerScreen.style.display = "none";
  mainUI.style.display = "block";
  ytPlayer.stopVideo();
}

/* PLAYER CONTROLS */
playerControls.addEventListener("click", e=>{
  const btn = e.target.closest(".player-btn");
  if(!btn) return;

  const action = btn.dataset.action;

  if(action === "playpause"){
    const s = ytPlayer.getPlayerState();
    if(s === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  }
  if(action === "forward10"){
    ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  }
  if(action === "back10"){
    ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 10), true);
  }
  if(action === "goback"){
    closePlayer();
  }
});

/* MOVE HIGHLIGHT */
function moveHighlight(delta){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;

  highlightIndex += delta;

  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;

  applyHighlight();
}

/* OPEN HIGHLIGHTED VIDEO */
function openHighlightedVideo(){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;

  const card = cards[highlightIndex];
  const id = card.dataset.videoId;
  if(id) openVideo(id);
}

/* KEYDOWN */
document.addEventListener("keydown", e=>{
  if(playerMode) return;

  userHasNavigated = true;

  if(currentTab === "search"){
    highlightIndex = -1;
  }

  if(keyboardActive){
    if(["Enter","ArrowDown","ArrowUp"].includes(e.key)){
      return;
    }
  }

  if(e.key === "ArrowDown") moveHighlight(1);
  if(e.key === "ArrowUp") moveHighlight(-1);
  if(e.key === "Enter") openHighlightedVideo();
});

/* CLICK OUTSIDE HIDES KEYBOARD */
document.addEventListener("click", e=>{
  if(!keyboard.contains(e.target) && e.target !== searchInput){
    hideKeyboard();
    searchInput.blur();
  }
});

/* SEARCH BAR */
searchInput.addEventListener("focus", showKeyboard);
searchInput.addEventListener("click", ()=>{
  highlightIndex = -1;
  showKeyboard();
});

/* KEYBOARD */
function showKeyboard(){
  keyboard.style.display = "block";
  keyboardActive = true;
  highlightIndex = -1;
}

function hideKeyboard(){
  keyboard.style.display = "none";
  keyboardActive = false;
}

keyboard.addEventListener("click", async e=>{
  const key = e.target.closest(".kb-key");
  if(!key) return;

  const special = key.dataset.special;

  if(special){
    if(special === "space") searchInput.value += " ";
    if(special === "backspace") searchInput.value = searchInput.value.slice(0,-1);
    if(special === "clear") searchInput.value = "";
    if(special === "enter"){
      hideKeyboard();
      searchInput.blur();
      const q = searchInput.value.trim();
      if(q){
        currentQuery = q;
        nextPageToken = null;
        const items = await ytSearch(q, null, 40, "");
        showVideos(items, false);
      }
    }
  } else {
    searchInput.value += key.textContent;
  }
});

/* INITIAL LOAD */
(async ()=>{
  highlightIndex = -1;
  userHasNavigated = false;
  await loadQuery("", 50, "videoDuration=medium&order=viewCount");
})();
</script>

</body>
</html>
