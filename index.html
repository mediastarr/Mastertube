<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ViewTube – Fullscreen Player</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    width: 100%;
    height: 100%;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  #root {
    width: 600px;
    height: 600px;
    position: relative;
    overflow: hidden;
  }
  .banner {
    margin: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
  }
  .yt {
    width: 26px;
    height: 26px;
    background: #ff0000;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .yt::before {
    content: "";
    border-left: 8px solid white;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }
  .tabs {
    margin: 0 10px 10px 10px;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: rgba(0,0,0,0.5);
    border-radius: 999px;
  }
  .tab {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 12px;
    cursor: pointer;
  }
  .tab.active {
    background: #ff0000;
    border-color: #ff0000;
  }
  .content {
    margin: 0 10px 10px 10px;
    padding: 10px;
    height: 420px;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
  }
  .video {
    display: flex;
    gap: 10px;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    cursor: pointer;
  }
  .thumb {
    width: 100px;
    height: 56px;
    border-radius: 8px;
    overflow: hidden;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .video.highlight {
    border: 2px solid #ff0000;
  }

  /* FULLSCREEN PLAYER */
  #player-screen {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #player-container {
    width: 560px;
    height: 315px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  #player-controls {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }
  .player-btn {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    font-size: 12px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="root">

  <!-- MAIN UI -->
  <div id="main-ui">
    <div class="banner">
      <div class="yt"></div>
      <div style="font-size:18px;font-weight:700">ViewTube</div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="all">All</div>
      <div class="tab" data-tab="shorts">Shorts</div>
      <div class="tab" data-tab="news">News</div>
      <div class="tab" data-tab="anime">Anime</div>
      <div class="tab" data-tab="live">Live</div>
      <div class="tab" data-tab="movies">Movies</div>
      <div class="tab" data-tab="comedy">Comedy</div>
    </div>

    <div class="content" id="content"></div>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div id="player-screen">
    <div id="player-container">
      <div id="player"></div>
    </div>
    <div id="player-controls">
      <button class="player-btn" data-action="back10">-10s</button>
      <button class="player-btn" data-action="playpause">Play/Pause</button>
      <button class="player-btn" data-action="forward10">+10s</button>
      <button class="player-btn" data-action="goback">Go Back</button>
    </div>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* Simple key rotation */
const KEYS = [
  "AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
  "AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI"
];
let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const mainUI = document.getElementById("main-ui");
const playerScreen = document.getElementById("player-screen");
const playerControls = document.getElementById("player-controls");

let currentQuery = "";
let nextPageToken = null;
let highlightIndex = 0;
let ytPlayer = null;
let playerMode = false;

function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player("player", {
    height: "315",
    width: "560",
    videoId: "",
    playerVars: { controls: 1, rel: 0 }
  });
}

async function ytSearch(q, pageToken=null, maxResults=25, extra=""){
  const base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&regionCode=US&relevanceLanguage=en&order=date&maxResults="
    + maxResults +
    "&q=" + encodeURIComponent(q) +
    "&key=" + apiKey() +
    (extra ? "&" + extra : "");
  const url = pageToken ? base + "&pageToken=" + pageToken : base;
  const r = await fetch(url);
  const j = await r.json();
  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}

async function loadQuery(q, maxResults=25, extra=""){
  currentQuery = q;
  nextPageToken = null;
  const items = await ytSearch(q, null, maxResults, extra);
  showVideos(items, false);
}

function showVideos(items, append){
  if(!append){
    content.innerHTML = "";
    highlightIndex = 0;
  }
  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = (sn.thumbnails && sn.thumbnails.medium && sn.thumbnails.medium.url)
      ? sn.thumbnails.medium.url
      : "";

    const div = document.createElement("div");
    div.className = "video";
    div.dataset.videoId = id;
    div.onclick = ()=>openVideo(id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div>${sn.title}</div>
        <div style="font-size:12px;opacity:0.7">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });
  applyHighlight();
}

function applyHighlight(){
  const cards = [...content.querySelectorAll(".video")];
  cards.forEach(c=>c.classList.remove("highlight"));
  if(cards.length === 0) return;
  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;
  const card = cards[highlightIndex];
  card.classList.add("highlight");
  card.scrollIntoView({block:"center", behavior:"smooth"});
}

content.addEventListener("scroll", ()=>{
  if(content.scrollTop + content.clientHeight >= content.scrollHeight - 40){
    loadMore();
  }
});

async function loadMore(){
  if(!nextPageToken) return;
  const items = await ytSearch(currentQuery, nextPageToken, 25);
  showVideos(items, true);
}

/* Tabs */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab = t.dataset.tab;
  let q = "";
  let max = 25;
  let extra = "";

  if(tab === "all"){
    q = "movies OR documentaries OR music videos OR trailers";
    max = 50;
  }
  if(tab === "shorts"){
    q = "US shorts";
    extra = "videoDuration=short";
  }
  if(tab === "news"){
    q = "US news";
  }
  if(tab === "anime"){
    q = "anime english dub";
  }
  if(tab === "live"){
    q = "live stream";
    extra = "eventType=live";
  }
  if(tab === "movies"){
    q = "full movie free";
    extra = "videoDuration=long";
  }
  if(tab === "comedy"){
    q = "stand up comedy";
  }

  await loadQuery(q, max, extra);
});

/* FULLSCREEN PLAYER */
function openVideo(id){
  playerMode = true;
  mainUI.style.display = "none";
  playerScreen.style.display = "flex";
  ytPlayer.loadVideoById(id);
  ytPlayer.playVideo();
}

function closePlayer(){
  playerMode = false;
  playerScreen.style.display = "none";
  mainUI.style.display = "block";
  ytPlayer.stopVideo();
}

/* Player controls */
playerControls.addEventListener("click", e=>{
  const btn = e.target.closest(".player-btn");
  if(!btn) return;
  const action = btn.dataset.action;

  if(action === "playpause"){
    const s = ytPlayer.getPlayerState();
    if(s === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  }
  if(action === "forward10"){
    ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  }
  if(action === "back10"){
    ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 10), true);
  }
  if(action === "goback"){
    closePlayer();
  }
});

/* Initial load */
(async ()=>{
  await loadQuery("movies OR documentaries OR music videos OR trailers", 50);
})();
</script>
</body>
</html>
