<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ViewTube – EMG Stealth Float</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    font-family: system-ui, sans-serif;
    color: #fff;
  }

  #root {
    width: 600px;
    height: 600px;
    position: relative;
    background: transparent;
    overflow: hidden;
  }

  /* Ultra-light glass, mostly transparent */
  .glass {
    background: rgba(0, 0, 0, 0.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
  }

  .banner {
    margin: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .yt {
    width: 26px;
    height: 26px;
    background: #ff0000;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 12px rgba(255,0,0,0.7);
  }

  .yt::before {
    content: "";
    border-left: 8px solid white;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }

  .tabs {
    margin: 0 10px 10px 10px;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: rgba(0, 0, 0, 0.08);
    backdrop-filter: blur(6px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .tab {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 12px;
    cursor: pointer;
  }

  .tab.active {
    background: rgba(255,0,0,0.75);
    border-color: rgba(255,0,0,0.9);
    box-shadow: 0 0 10px rgba(255,0,0,0.7);
  }

  /* S1: scroll inside content, tuned for ~4 visible cards */
  .content {
    margin: 0 10px 10px 10px;
    padding: 10px;
    height: 420px;
    overflow-y: scroll;
    background: rgba(0, 0, 0, 0.06);
    backdrop-filter: blur(4px);
    border: none;
  }

  /* Floating video tiles */
  .video {
    display: flex;
    gap: 10px;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.18);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 18px rgba(0,0,0,0.55);
    cursor: pointer;
  }

  .thumb {
    width: 100px;
    height: 56px;
    border-radius: 8px;
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* H1: red glow highlight */
  .video.highlight {
    border: 2px solid rgba(255,0,0,0.9);
    box-shadow: 0 0 14px rgba(255,0,0,0.8);
  }

  /* Keyboard */
  #keyboard {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 10px;
    padding: 10px;
    display: none;
    z-index: 20;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(8px);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  #kb-input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.6);
    color: white;
    margin-bottom: 8px;
  }

  .kb-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .key {
    padding: 8px 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 12px;
    cursor: pointer;
  }

  .enter {
    background: rgba(0,255,0,0.35);
    border-color: rgba(0,255,0,0.6);
  }
</style>
</head>

<body>
<div id="root">

  <div class="banner">
    <div class="yt"></div>
    <div style="font-size:18px;font-weight:700">ViewTube</div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="all">All</div>
    <div class="tab" data-tab="shorts">Shorts</div>
    <div class="tab" data-tab="news">News</div>
    <div class="tab" data-tab="anime">Anime</div>
    <div class="tab" data-tab="live">Live</div>
    <div class="tab" data-tab="movies">Movies</div>
    <div class="tab" data-tab="comedy">Comedy</div>
    <div class="tab" data-tab="search">Search</div>
  </div>

  <div class="content" id="content"></div>

  <!-- Keyboard -->
  <div id="keyboard">
    <input id="kb-input" placeholder="Search…" />
    <div class="kb-row" id="kb-keys"></div>
    <div class="kb-row">
      <div class="key enter" id="kb-enter">Enter</div>
    </div>
  </div>

</div>

<script>
/* API KEYS: original + new */
const KEYS = [
  "AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
  "AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI",
  "AIzaSyD903GIIkzLZyeOvqMrVW3q3wJy4jcHO7E",
  "AIzaSyCWlw8qpBueGgjvTF4BZ54syzQkTevM_8g",
  "AIzaSyDIjQgEy4VmFN2OxUkJisqVFw9repJcTF8",
  "AIzaSyD6aEVz7iaTGJShyDDBZT4C27YG1vEc1_M",
  "AIzaSyAGKeySf2F3BskBrZNylOSGJuHQRX_Rp5E",
  "AIzaSyBBgj7-tN6VBAG3ziJQKCQL7EJZR4wUW-k",
  "AIzaSyCUmBro68VHtC6_OsqlpssTVasHk2NmBLc",
  "AIzaSyDXugJlNG12ObzxV5WGjgNVob5OhfF6moM",
  "AIzaSyBsq-CNj2VFfgaQkaGFCQJCzIc28OzuFuw",
  "AIzaSyBq-q38IF6iVxgo7EeQLtkB7V25n6WcGYo",
  "AIzaSyA9c7WYaPVU_kvlTfOvLfxcFZY8TIc5nwo",
  "AIzaSyCqFHwn3azAH2eOSZK8Ch4tZivl3GKb_Zs",
  "AIzaSyDblb5nF7wjMPJR7DtBTRseyTr64rjXn7E",
  "AIzaSyA772yWhSkiwVgIFymHk9txl2UotHBksgI",
  "AIzaSyBYKzKQShGsifFIZZ0yV-9quqM50pmuCQk",
  "AIzaSyAjREsAJQWVX1Q4optfjBKjQzKQvVGYUIM",
  "AIzaSyAqKWwYEh1QFxT69Nh4htYAkQXlC6vAjwo",
  "AIzaSyBsgRu97z8s_477NEKKQop46sndfe8ZdBE"
];
let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

/* DOM */
const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const kb = document.getElementById("keyboard");
const kbInput = document.getElementById("kb-input");
const kbKeys = document.getElementById("kb-keys");

/* Paging state */
let currentQuery = "trending";
let nextPageToken = null;

/* Highlight state */
let highlightIndex = 0;

/* Render videos */
function showVideos(items, append=false){
  if(!append) {
    content.innerHTML = "";
    highlightIndex = 0;
  }
  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = sn.thumbnails?.medium?.url || "";

    const div = document.createElement("div");
    div.className = "video";
    div.dataset.videoId = id;
    div.onclick = ()=>window.open("https://youtube.com/watch?v="+id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div class="video-title">${sn.title}</div>
        <div class="video-channel">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });
  applyHighlight();
}

/* Apply highlight to current index */
function applyHighlight(){
  const cards = [...content.querySelectorAll(".video")];
  cards.forEach(c=>c.classList.remove("highlight"));
  if(cards.length === 0) return;
  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;
  const card = cards[highlightIndex];
  card.classList.add("highlight");
  card.scrollIntoView({block:"center", behavior:"smooth"});
}

/* Move highlight up/down */
function moveHighlight(delta){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;
  highlightIndex += delta;
  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;
  applyHighlight();
}

/* Select highlighted video */
function selectHighlighted(){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;
  const card = cards[highlightIndex];
  const id = card.dataset.videoId;
  if(id) window.open("https://youtube.com/watch?v="+id);
}

/* Fetch */
async function yt(q, pageToken=null){
  const base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=25&regionCode=US&q="
    + encodeURIComponent(q)
    + "&key=" + apiKey();
  const url = pageToken ? base + "&pageToken=" + pageToken : base;
  const r = await fetch(url);
  const j = await r.json();
  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}

/* Load query (fresh) */
async function loadQuery(q){
  currentQuery = q;
  nextPageToken = null;
  const items = await yt(q);
  showVideos(items, false);
}

/* Load more when scrolling to bottom */
async function loadMore(){
  if(!nextPageToken) return;
  const items = await yt(currentQuery, nextPageToken);
  showVideos(items, true);
}

/* Scroll listener for infinite load */
content.addEventListener("scroll", ()=>{
  const threshold = 40;
  if(content.scrollTop + content.clientHeight >= content.scrollHeight - threshold){
    loadMore();
  }
});

/* Tab logic */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab = t.dataset.tab;

  if(tab==="search"){
    kb.style.display = "block";
    kbInput.value = "";
    return;
  }

  kb.style.display = "none";

  const queryMap = {
    all: "trending",
    shorts: "shorts",
    news: "US news",
    anime: "anime english dub",
    live: "live stream",
    movies: "full movie",
    comedy: "stand up comedy"
  };

  await loadQuery(queryMap[tab]);
});

/* Keyboard */
const letters = "QWERTYUIOPASDFGHJKLZXCVBNM ".split("");
letters.forEach(ch=>{
  const k = document.createElement("div");
  k.className = "key";
  k.textContent = ch===" " ? "Space" : ch;
  k.onclick = ()=>{
    kbInput.value += (ch===" " ? " " : ch);
  };
  kbKeys.appendChild(k);
});

document.getElementById("kb-enter").onclick = async ()=>{
  const q = kbInput.value.trim();
  kb.style.display = "none";
  if(q){
    await loadQuery(q);
  }
};

/* EMG / gesture placeholder */
const MetaWearables = {
  onGesture(cb){
    // hook your real EMG SDK here
    console.log("EMG gesture system ready (placeholder)");
  }
};

MetaWearables.onGesture(g=>{
  if(g === "swipe_right"){
    const tabsArr = [...document.querySelectorAll(".tab")];
    let i = tabsArr.findIndex(t=>t.classList.contains("active"));
    tabsArr[(i+1) % tabsArr.length].click();
  }
  if(g === "swipe_left"){
    const tabsArr = [...document.querySelectorAll(".tab")];
    let i = tabsArr.findIndex(t=>t.classList.contains("active"));
    tabsArr[(i-1+tabsArr.length) % tabsArr.length].click();
  }
  if(g === "swipe_up"){
    moveHighlight(-1);
  }
  if(g === "swipe_down"){
    moveHighlight(1);
  }
  if(g === "pinch"){
    selectHighlighted();
  }
  if(g === "fist"){
    const active = document.querySelector(".tab.active");
    if(active) active.click();
  }
});

/* Initial load */
(async ()=>{
  await loadQuery("trending");
})();
</script>

</body>
</html>
