<script>

/* UPDATED API KEY ROTATION — ALL KEYS INCLUDED */
const KEYS = [

  "AIzaSyCiEMfafGEgqpZ94b9ENjAg0UaIku0NRE8",
  "AIzaSyA0prh1a0eN4fZ6MA_eB4MPJ0UH4LPsIAc",
  "AIzaSyDiisGuMjbilWyxKAFpTPu4am8d5yQagJI",
  "AIzaSyDI3sl7QYBrXOgAwCyjwJ23pV1nbjUMVL0",
  "AIzaSyD_Jfk_5wuEdVhDEsQX9uy3BW2Fio7xe0s",
  "AIzaSyCpAzwCaG2I8gEusAsDKnkoxVMdkPg1Vpk"
];

let keyIndex = 0;
function apiKey(){ return KEYS[keyIndex++ % KEYS.length]; }

/* DOM ELEMENTS */
const content = document.getElementById("content");
const tabs = document.getElementById("tabs");
const mainUI = document.getElementById("main-ui");
const playerScreen = document.getElementById("player-screen");
const playerControls = document.getElementById("player-controls");
const searchBarWrapper = document.getElementById("search-bar-wrapper");
const searchInput = document.getElementById("search-input");
const keyboard = document.getElementById("keyboard");

/* STATE */
let currentQuery = "";
let nextPageToken = null;
let highlightIndex = -1;
let ytPlayer = null;
let playerMode = false;
let currentTab = "all";
let keyboardActive = false;
let userHasNavigated = false;

/* PLAYER INIT */
function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player("player", {
    height: "315",
    width: "560",
    videoId: "",
    playerVars: { controls: 1, rel: 0 }
  });
}

/* US‑ONLY SEARCH */
async function ytSearch(q, pageToken=null, maxResults=25, extra=""){
  let base =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video" +
    "&regionCode=US&relevanceLanguage=en&safeSearch=none" +
    "&order=date&maxResults=" + maxResults +
    "&q=" + encodeURIComponent(q) +
    "&key=" + apiKey();

  if(extra) base += "&" + extra;
  if(pageToken) base += "&pageToken=" + pageToken;

  const r = await fetch(base);
  const j = await r.json();

  nextPageToken = j.nextPageToken || null;
  return j.items || [];
}

/* LOAD QUERY */
async function loadQuery(q, maxResults=25, extra=""){
  currentQuery = q;
  nextPageToken = null;

  const items = await ytSearch(q, null, maxResults, extra);

  if(!items || items.length === 0){
    highlightIndex = -1;
  }

  showVideos(items, false);
}

/* RENDER VIDEOS */
function showVideos(items, append){
  if(!append){
    content.innerHTML = "";

    if(currentTab !== "search" && userHasNavigated){
      highlightIndex = 0;
    } else {
      highlightIndex = -1;
    }
  }

  items.forEach(v=>{
    const id = v.id.videoId || v.id;
    const sn = v.snippet;
    const thumb = sn.thumbnails?.medium?.url || "";

    const div = document.createElement("div");
    div.className = "video";
    div.dataset.videoId = id;
    div.onclick = ()=>openVideo(id);

    div.innerHTML = `
      <div class="thumb"><img src="${thumb}"></div>
      <div>
        <div>${sn.title}</div>
        <div style="font-size:12px;opacity:0.7">${sn.channelTitle}</div>
      </div>
    `;
    content.appendChild(div);
  });

  applyHighlight();
}

/* APPLY HIGHLIGHT */
function applyHighlight(){
  const cards = [...content.querySelectorAll(".video")];
  cards.forEach(c=>c.classList.remove("highlight"));

  if(highlightIndex < 0 || highlightIndex >= cards.length) return;

  const card = cards[highlightIndex];
  card.classList.add("highlight");
  card.scrollIntoView({block:"center", behavior:"smooth"});
}

/* SCROLL FIX */
content.addEventListener("scroll", ()=>{
  if(currentTab === "search"){
    highlightIndex = -1;
    hideKeyboard();
    searchInput.blur();
  }

  if(content.scrollTop + content.clientHeight >= content.scrollHeight - 40){
    loadMore();
  }
});

/* LOAD MORE */
async function loadMore(){
  if(!nextPageToken) return;
  const items = await ytSearch(currentQuery, nextPageToken, 25);
  showVideos(items, true);
}

/* TAB SWITCHING */
tabs.addEventListener("click", async e=>{
  const t = e.target.closest(".tab");
  if(!t) return;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab = t.dataset.tab;
  currentTab = tab;

  nextPageToken = null;
  highlightIndex = -1;
  userHasNavigated = false;
  content.innerHTML = "";

  if(tab === "search"){
    searchBarWrapper.style.display = "block";
    keyboardActive = false;
  } else {
    searchBarWrapper.style.display = "none";
    hideKeyboard();
  }

  let q="", max=25, extra="";

  /* ⭐ FIXED — REAL US LONG VIDEOS */
  if(tab === "all"){
    q = "";
    max = 50;
    extra = "videoDuration=medium&order=viewCount";
  }

  /* ⭐ FIXED — REAL US SHORTS */
  if(tab === "shorts"){
    q = "";
    max = 50;
    extra = "videoDuration=short&order=date";
  }

  if(tab === "news"){ q="US news"; max=40; }
  if(tab === "anime"){ q="anime english dub"; max=40; }
  if(tab === "live"){ q="live stream"; max=40; extra="eventType=live"; }
  if(tab === "movies"){ q="full movie free"; max=40; extra="videoDuration=long"; }
  if(tab === "comedy"){ q="stand up comedy"; max=40; }

  if(tab !== "search"){
    await loadQuery(q, max, extra);
  }
});

/* OPEN VIDEO */
function openVideo(id){
  hideKeyboard();
  searchInput.blur();
  playerMode = true;
  mainUI.style.display = "none";
  playerScreen.style.display = "flex";
  ytPlayer.loadVideoById(id);
  ytPlayer.playVideo();
}

/* CLOSE PLAYER */
function closePlayer(){
  playerMode = false;
  playerScreen.style.display = "none";
  mainUI.style.display = "block";
  ytPlayer.stopVideo();
}

/* PLAYER CONTROLS */
playerControls.addEventListener("click", e=>{
  const btn = e.target.closest(".player-btn");
  if(!btn) return;

  const action = btn.dataset.action;

  if(action === "playpause"){
    const s = ytPlayer.getPlayerState();
    if(s === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  }
  if(action === "forward10"){
    ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  }
  if(action === "back10"){
    ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 10), true);
  }
  if(action === "goback"){
    closePlayer();
  }
});

/* MOVE HIGHLIGHT */
function moveHighlight(delta){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;

  highlightIndex += delta;

  if(highlightIndex < 0) highlightIndex = 0;
  if(highlightIndex >= cards.length) highlightIndex = cards.length - 1;

  applyHighlight();
}

/* OPEN HIGHLIGHTED VIDEO */
function openHighlightedVideo(){
  const cards = [...content.querySelectorAll(".video")];
  if(cards.length === 0) return;

  const card = cards[highlightIndex];
  const id = card.dataset.videoId;
  if(id) openVideo(id);
}

/* KEYDOWN — FIXED */
document.addEventListener("keydown", e=>{
  if(playerMode) return;

  userHasNavigated = true;

  if(currentTab === "search"){
    highlightIndex = -1;
  }

  if(keyboardActive){
    if(["Enter","ArrowDown","ArrowUp"].includes(e.key)){
      return;
    }
  }

  if(e.key === "ArrowDown") moveHighlight(1);
  if(e.key === "ArrowUp") moveHighlight(-1);
  if(e.key === "Enter") openHighlightedVideo();
});

/* CLICK OUTSIDE HIDES KEYBOARD */
document.addEventListener("click", e=>{
  if(!keyboard.contains(e.target) && e.target !== searchInput){
    hideKeyboard();
    searchInput.blur();
  }
});

/* SEARCH BAR */
searchInput.addEventListener("focus", showKeyboard);
searchInput.addEventListener("click", ()=>{
  highlightIndex = -1;
  showKeyboard();
});

/* KEYBOARD */
function showKeyboard(){
  keyboard.style.display = "block";
  keyboardActive = true;
  highlightIndex = -1;
}

function hideKeyboard(){
  keyboard.style.display = "none";
  keyboardActive = false;
}

keyboard.addEventListener("click", async e=>{
  const key = e.target.closest(".kb-key");
  if(!key) return;

  const special = key.dataset.special;

  if(special){
    if(special === "space") searchInput.value += " ";
    if(special === "backspace") searchInput.value = searchInput.value.slice(0,-1);
    if(special === "clear") searchInput.value = "";
    if(special === "enter"){
      hideKeyboard();
      searchInput.blur();
      const q = searchInput.value.trim();
      if(q){
        currentQuery = q;
        nextPageToken = null;
        const items = await ytSearch(q, null, 40, "");
        showVideos(items, false);
      }
    }
  } else {
    searchInput.value += key.textContent;
  }
});

/* INITIAL LOAD */
(async ()=>{
  highlightIndex = -1;
  userHasNavigated = false;
  await loadQuery("", 50, "videoDuration=medium&order=viewCount");
})();
</script>

</body>
</html>
