<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meta Ray‑Ban YouTube AR</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #ffffff;
    }

    #rayban-display {
      position: relative;
      width: 600px;
      height: 600px;
      overflow: hidden;
      border-radius: 24px;
    }

    .ui-shell {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.25);
      border-radius: 24px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-weight: 700;
      font-size: 16px;
      margin-right: 12px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .tab.active {
      background: #ff0000;
      border-color: #ff0000;
    }

    .content {
      display: grid;
      grid-template-rows: 1fr;
      padding: 8px 12px;
      gap: 8px;
      height: calc(600px - 40px);
    }

    /* FLOATING AR VIDEO PLAYER — HIDDEN BY DEFAULT */
    #player {
      display: none; /* <-- IMPORTANT */
      position: fixed;
      top: 40px;
      right: 40px;
      width: 480px;
      height: 270px;
      z-index: 9999;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.7);
      transform: translateZ(50px);
    }

    .player-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 12px;
      pointer-events: none;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      pointer-events: auto;
    }

    .list {
      overflow-y: auto;
      padding-right: 4px;
    }

    .video-item {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding: 4px;
      border-radius: 10px;
      cursor: pointer;
    }

    .floating-card {
      transform-style: preserve-3d;
      animation: float 3.5s ease-in-out infinite;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.4s ease-out, transform 0.3s ease-out;
    }

    .floating-card.ready {
      opacity: 1;
      transform: translateZ(30px);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* HUD */
    #hud {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      padding:10px 16px;
      background:rgba(0,0,0,0.6);
      border-radius:12px;
      font-size:14px;
      color:white;
      opacity:0;
      transition:opacity 0.25s;
      pointer-events:none;
    }
  </style>
</head>

<body>

  <div id="rayban-display">
    <div class="ui-shell">
      <div class="top-bar">
        <div class="logo">YouTube • Meta Ray‑Ban</div>

        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="home">Home</div>
          <div class="tab" data-tab="shorts">Shorts</div>
          <div class="tab" data-tab="haiti">Haiti</div>
          <div class="tab" data-tab="news">News</div>
          <div class="tab" data-tab="anime">Anime</div>
          <div class="tab" data-tab="live">Live</div>
          <div class="tab" data-tab="movies">Movies</div>
          <div class="tab" data-tab="comedy">Comedy</div>
          <div class="tab" data-tab="search">Search</div>
        </div>
      </div>

      <div class="content">
        <div class="list" id="list"></div>
      </div>
    </div>

    <div id="hud"></div>
  </div>

  <!-- FLOATING VIDEO PLAYER -->
  <div id="player">
    <div id="playerFrame"></div>

    <div class="player-overlay">
      <div class="player-top">
        <div id="playerChannel">Channel</div>
        <div id="playerStats">0 views</div>
      </div>

      <div class="player-bottom">
        <div class="player-title" id="playerTitle">Select a video…</div>

        <div class="player-controls">
          <div class="control-pill" id="btnBack">⟲ -10s</div>
          <div class="control-pill" id="btnPlayPause">▶ Play</div>
          <div class="control-pill" id="btnForward">⟳ +10s</div>
          <div class="control-pill" id="btnClose">⟵ Back</div>
        </div>
      </div>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
<script>
/* ————————————————————————————————
   API KEYS + HELPERS
——————————————————————————————— */
const API_KEYS = [
  "AIzaSyAiG74ZYcjR4K78NPfUe3sQGeJLnoBIXYU",
  "AIzaSyDVDUackHINzULJ6qasLLKDZUIBBxTORTI"
];
let apiKeyIndex = 0;
function getApiKey() {
  const key = API_KEYS[apiKeyIndex % API_KEYS.length];
  apiKeyIndex++;
  return key;
}

/* ————————————————————————————————
   META RAY‑BAN + EMG (stub hooks)
——————————————————————————————— */
function initMetaWearables() {
  console.log("Meta Wearables initialized");
}
function initEmgWristband() {
  console.log("EMG Wristband initialized");
  // When your SDK detects a gesture:
  // handleGesture("swipeUp")
}

/* ————————————————————————————————
   YOUTUBE API FETCH
——————————————————————————————— */
const MAX_RESULTS = 50;

async function fetchYouTube(endpoint, params) {
  const key = getApiKey();
  const url = new URL("https://www.googleapis.com/youtube/v3/" + endpoint);
  params.key = key;
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  if (!res.ok) return { items: [] };
  return res.json();
}

const baseParams = {
  regionCode: "US",
  relevanceLanguage: "en",
  maxResults: MAX_RESULTS,
  type: "video",
  part: "snippet,contentDetails,statistics"
};

const loaders = {
  home: () => fetchYouTube("videos", { ...baseParams, chart: "mostPopular" }),
  shorts: () => fetchYouTube("search", { ...baseParams, videoDuration: "short", order: "date" }),
  haiti: () => fetchYouTube("search", { ...baseParams, q: "Haiti movie OR Haiti" }),
  news: () => fetchYouTube("search", { ...baseParams, q: "US news", order: "date" }),
  anime: () => fetchYouTube("search", { ...baseParams, q: "anime English dub US" }),
  live: () => fetchYouTube("search", { ...baseParams, eventType: "live", order: "date" }),
  movies: () => fetchYouTube("search", { ...baseParams, videoDuration: "long", q: "full movie free US" }),
  comedy: () => fetchYouTube("search", { ...baseParams, q: "stand up comedy US" }),
  search: (query) => fetchYouTube("search", { ...baseParams, q: query })
};

/* ————————————————————————————————
   DOM ELEMENTS
——————————————————————————————— */
const listEl = document.getElementById("list");
const tabsEl = document.getElementById("tabs");
const hud = document.getElementById("hud");

const playerEl = document.getElementById("player");
const playerTitle = document.getElementById("playerTitle");
const playerChannel = document.getElementById("playerChannel");
const playerStats = document.getElementById("playerStats");

const btnPlayPause = document.getElementById("btnPlayPause");
const btnForward = document.getElementById("btnForward");
const btnBack = document.getElementById("btnBack");
const btnClose = document.getElementById("btnClose");

/* ————————————————————————————————
   YOUTUBE IFRAME PLAYER
——————————————————————————————— */
let ytPlayer = null;
let currentVideoId = null;
let isPlaying = false;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player("playerFrame", {
    height: "100%",
    width: "100%",
    playerVars: { controls: 0, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => console.log("YT Player Ready"),
      onStateChange: (e) => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        updatePlayPauseLabel();
      }
    }
  });
}

function updatePlayPauseLabel() {
  btnPlayPause.textContent = isPlaying ? "⏸ Pause" : "▶ Play";
}

/* ————————————————————————————————
   HUD
——————————————————————————————— */
function showHUD(text) {
  hud.textContent = text;
  hud.style.opacity = 1;
  clearTimeout(hud._timer);
  hud._timer = setTimeout(() => (hud.style.opacity = 0), 900);
}

/* ————————————————————————————————
   TAB LOADING
——————————————————————————————— */
let currentTab = "home";
let selectedIndex = 0;

function setActiveTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t) =>
    t.classList.toggle("active", t.dataset.tab === tab)
  );
  loadTab(tab);
}

async function loadTab(tab) {
  listEl.innerHTML = "";

  if (tab === "search") {
    renderSearchUI();
    return;
  }

  const data = await loaders[tab]();
  const items = data.items || [];

  items.forEach((item) => {
    const videoId = item.id.videoId || item.id;
    const snippet = item.snippet || {};
    const stats = item.statistics || {};

    const el = document.createElement("div");
    el.className = "video-item floating-card";
    el.onclick = () => playVideo(videoId, snippet, stats);

    const thumb = document.createElement("div");
    thumb.className = "thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.medium?.url || "";
    thumb.appendChild(img);

    const meta = document.createElement("div");
    meta.className = "meta";

    const title = document.createElement("div");
    title.className = "meta-title";
    title.textContent = snippet.title;

    const channel = document.createElement("div");
    channel.className = "meta-channel";
    channel.textContent = snippet.channelTitle;

    const extra = document.createElement("div");
    extra.className = "meta-extra";
    extra.textContent = (stats.viewCount || "0") + " views";

    meta.appendChild(title);
    meta.appendChild(channel);
    meta.appendChild(extra);

    el.appendChild(thumb);
    el.appendChild(meta);
    listEl.appendChild(el);

    setTimeout(() => el.classList.add("ready"), 50);
  });

  selectedIndex = 0;
  highlightSelected();
}

/* ————————————————————————————————
   VIDEO PLAYER SHOW/HIDE
——————————————————————————————— */
function playVideo(videoId, snippet, stats) {
  currentVideoId = videoId;

  // SHOW PLAYER
  playerEl.style.display = "block";

  ytPlayer.loadVideoById(videoId);

  playerTitle.textContent = snippet.title;
  playerChannel.textContent = snippet.channelTitle;
  playerStats.textContent = Number(stats.viewCount || 0).toLocaleString() + " views";

  isPlaying = true;
  updatePlayPauseLabel();
}

btnClose.addEventListener("click", () => {
  ytPlayer.stopVideo();
  playerEl.style.display = "none"; // HIDE PLAYER
  isPlaying = false;
  updatePlayPauseLabel();
});

/* ————————————————————————————————
   PLAYER CONTROLS
——————————————————————————————— */
btnPlayPause.addEventListener("click", () => {
  if (isPlaying) ytPlayer.pauseVideo();
  else ytPlayer.playVideo();
});

btnForward.addEventListener("click", () => {
  ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  showHUD("+10s");
});

btnBack.addEventListener("click", () => {
  ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 10), true);
  showHUD("-10s");
});

/* ————————————————————————————————
   SELECTION + SWIPE NAVIGATION
——————————————————————————————— */
function highlightSelected() {
  const items = document.querySelectorAll(".video-item");
  items.forEach((el, i) => {
    el.style.outline = i === selectedIndex ? "2px solid red" : "none";
  });
}

function moveSelection(delta) {
  const items = document.querySelectorAll(".video-item");
  if (!items.length) return;
  selectedIndex = (selectedIndex + delta + items.length) % items.length;
  highlightSelected();
}

function openSelectedVideo() {
  const items = document.querySelectorAll(".video-item");
  if (items[selectedIndex]) items[selectedIndex].click();
}

/* ————————————————————————————————
   EMG GESTURE HANDLER
——————————————————————————————— */
function handleGesture(g) {
  switch (g) {
    case "swipeUp": moveSelection(-1); showHUD("↑"); break;
    case "swipeDown": moveSelection(1); showHUD("↓"); break;
    case "swipeLeft": cycleTab(-1); showHUD("◀"); break;
    case "swipeRight": cycleTab(1); showHUD("▶"); break;

    case "fist": btnPlayPause.click(); break;
    case "rotateIn": btnBack.click(); break;
    case "rotateOut": btnForward.click(); break;

    case "handOpen": adjustBrightness(0.1); break;
    case "handClose": adjustBrightness(-0.1); break;

    case "pinch": adjustVolume(0.1); break;
    case "pinchHold": adjustVolume(-0.1); break;

    case "doubleTap": btnClose.click(); break;
  }
}

function cycleTab(direction) {
  const tabs = Array.from(document.querySelectorAll(".tab"));
  let index = tabs.findIndex((t) => t.dataset.tab === currentTab);
  index = (index + direction + tabs.length) % tabs.length;
  setActiveTab(tabs[index].dataset.tab);
}

/* ————————————————————————————————
   BRIGHTNESS + VOLUME
——————————————————————————————— */
let currentBrightness = 1.0;

function adjustBrightness(delta) {
  currentBrightness = Math.max(0.1, Math.min(1.0, currentBrightness + delta));
  showHUD("Brightness " + Math.round(currentBrightness * 100) + "%");
}

function adjustVolume(delta) {
  let vol = ytPlayer.getVolume();
  vol = Math.max(0, Math.min(100, vol + delta * 100));
  ytPlayer.setVolume(vol);
  showHUD("Volume " + vol + "%");
}

/* ————————————————————————————————
   INIT
——————————————————————————————— */
tabsEl.addEventListener("click", (e) => {
  const tab = e.target.closest(".tab");
  if (tab) setActiveTab(tab.dataset.tab);
});

initMetaWearables();
initEmgWristband();
setActiveTab("home");
</script>

</body>
</html>
